<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IoT VIP Pro — Révision Interactive</title>
<meta name="description" content="Plateforme de révision interactive : IoT, LoRa, Sigfox, MQTT, 5G">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090b;--panel:#18181b;--border:rgba(255,255,255,0.06);
  --accent:#8b5cf6;--accent2:#c4b5fd;
  --ok:#10b981;--warn:#f59e0b;--err:#ef4444;
  --txt:#fafafa;--txt2:#b5b5c3;
  --font:'Sora',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:var(--font);font-size:15px;line-height:1.6;min-height:100vh;position:relative;z-index:0}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at top,rgba(139,92,246,.06) 0%,transparent 50%);z-index:-1;pointer-events:none}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:rgba(139,92,246,0.5)}
*:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
#scroll-prog{position:fixed;top:0;left:0;height:2px;background:var(--accent);z-index:9999;transition:width .1s;pointer-events:none}
nav{position:sticky;top:0;z-index:1000;background:rgba(9,9,11,0.8);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center}
.nav-brand{padding:0 16px;font-size:13px;font-weight:700;color:var(--accent);white-space:nowrap;border-right:1px solid var(--border);letter-spacing:.5px;height:48px;display:flex;align-items:center}
.nav-tabs{display:flex;flex:1;overflow-x:auto}
.tab-btn{padding:0 14px;height:48px;background:none;border:none;border-bottom:2px solid transparent;color:var(--txt2);cursor:pointer;font-family:var(--font);font-size:13px;font-weight:500;white-space:nowrap;transition:all .2s}
.tab-btn:hover{color:var(--txt);background:rgba(139,92,246,.07)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.nav-right{display:flex;align-items:center;gap:6px;padding:0 8px;border-left:1px solid var(--border)}
#search-box{background:var(--bg);border:1px solid var(--border);color:var(--txt);padding:7px 10px;border-radius:6px;font-family:var(--font);font-size:13px;width:150px;transition:border .2s}
#search-box:focus{outline:none;border-color:var(--accent)}
#search-box::placeholder{color:var(--txt2)}
main{max-width:1180px;margin:0 auto;padding:24px 16px}
.tab-panel{display:none;animation:fi .22s ease}
.tab-panel.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.dash{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:22px}
.stat{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center}
.stat .v{font-size:26px;font-weight:800;color:var(--accent)}
.stat .l{font-size:11px;color:var(--txt2);margin-top:3px}
.prog-wrap{background:var(--border);border-radius:4px;height:5px;margin-top:6px;overflow:hidden}
.prog-bar{height:100%;background:var(--accent);border-radius:4px;transition:width .4s}
.sec-title{font-size:17px;font-weight:700;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.badge{font-size:11px;background:var(--accent);color:#fff;padding:2px 8px;border-radius:20px;font-weight:600}
.tag{display:inline-block;font-size:11px;padding:2px 7px;border-radius:4px;font-weight:600}
.tag-rmi{background:rgba(96,165,250,.15);color:var(--accent2)}
.tag-rest{background:rgba(167,139,250,.15);color:#c4b5fd}
.tag-kafka{background:rgba(251,191,36,.15);color:#fbbf24}
.tag-rpc{background:rgba(52,211,153,.15);color:#34d399}
.tag-adv{background:rgba(251,113,133,.15);color:#fb7185}
.tag-easy{background:rgba(34,197,94,.15);color:var(--ok)}
.tag-med{background:rgba(245,158,11,.15);color:var(--warn)}
.tag-hard{background:rgba(239,68,68,.15);color:var(--err)}
.tag-intro{background:rgba(236,72,153,.15);color:#f472b6}
.tag-sockets{background:rgba(6,182,212,.15);color:#22d3ee}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:600;transition:all .2s;text-decoration:none}
.btn-p{background:#8b5cf6;color:#fff;box-shadow:inset 0 1px 1px rgba(255,255,255,0.2),0 2px 8px rgba(139,92,246,0.2)}.btn-p:hover{background:#7c3aed;box-shadow:inset 0 1px 1px rgba(255,255,255,0.2),0 4px 14px rgba(139,92,246,0.4);transform:translateY(-1px)}
.btn-s{background:var(--panel);border:1px solid var(--border);color:var(--txt2)}.btn-s:hover{border-color:var(--accent);color:var(--txt)}
.btn-ok{background:rgba(34,197,94,.15);border:1px solid var(--ok);color:var(--ok)}
.btn-err{background:rgba(239,68,68,.15);border:1px solid var(--err);color:var(--err)}
.btn-warn{background:rgba(245,158,11,.15);border:1px solid var(--warn);color:var(--warn)}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:14px;box-shadow:0 4px 20px rgba(0,0,0,.2);transition:all .3s ease}
.card:hover{border-color:rgba(139,92,246,.3);box-shadow:0 8px 30px rgba(0,0,0,.4);transform:translateY(-2px)}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.f-btn{padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--txt2);cursor:pointer;font-size:12px;font-weight:600;transition:all .2s}
.f-btn:hover,.f-btn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.hl{background:rgba(245,158,11,.3);color:var(--warn);border-radius:2px;padding:0 2px}
pre,code{font-family:var(--mono)}
pre{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px;overflow-x:auto;font-size:13px;line-height:1.6;white-space:pre}
code{background:rgba(139,92,246,.12);padding:1px 5px;border-radius:3px;color:var(--accent2);font-size:13px}
.kw{color:#c084fc;font-weight:600}.str{color:#86efac}.cmt{color:#6b7280;font-style:italic}.num{color:#fb923c}.cls{color:#fde68a}
.opt-btn{width:100%;text-align:left;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--txt);cursor:pointer;font-family:var(--font);font-size:14px;transition:all .2s;display:flex;gap:10px;align-items:flex-start;margin-bottom:7px}
.opt-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent2)}
.opt-btn:disabled{cursor:default}
.opt-btn.correct{border-color:var(--ok)!important;background:rgba(34,197,94,.1);color:var(--ok);animation:correctPop .3s ease}
.opt-btn.wrong{border-color:var(--err)!important;background:rgba(239,68,68,.1);color:var(--err);animation:wrongShake .35s ease}
@keyframes correctPop{0%{transform:scale(1)}50%{transform:scale(1.01)}100%{transform:scale(1)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
.opt-badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;margin-left:auto;flex-shrink:0;white-space:nowrap}
.opt-badge.ok{background:rgba(34,197,94,.2);color:var(--ok)}
.opt-badge.bad{background:rgba(239,68,68,.2);color:var(--err)}
.expl{margin-top:12px;padding:12px;background:rgba(139,92,246,.08);border-left:3px solid var(--accent);border-radius:0 6px 6px 0;font-size:13px;color:var(--txt2);display:none}
.expl.show{display:block}
.trap-note{margin-top:8px;padding:9px;background:rgba(245,158,11,.08);border-left:3px solid var(--warn);border-radius:0 6px 6px 0;font-size:12px;color:var(--warn);display:none}
.trap-note.show{display:block}
.q-nav{display:flex;flex-wrap:wrap;gap:5px;margin:14px 0}
.qn-btn{width:32px;height:32px;border-radius:5px;border:1px solid var(--border);background:var(--bg);color:var(--txt2);cursor:pointer;font-size:12px;font-weight:700;transition:all .2s}
.qn-btn.cur{border-color:var(--accent);background:rgba(139,92,246,.2);color:var(--accent)}
.qn-btn.ans{border-color:var(--ok);background:rgba(34,197,94,.15);color:var(--ok)}
.qn-btn.bad{border-color:var(--err);background:rgba(239,68,68,.15);color:var(--err)}
.qn-btn.skip{border-color:var(--warn);background:rgba(245,158,11,.15);color:var(--warn)}
.qn-btn.bk{border-color:var(--accent2)}
.timer{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--warn);padding:5px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px}
.timer.red{color:var(--err)}
.fc-arena{display:flex;justify-content:center;perspective:1200px;margin:20px 0;min-height:300px;align-items:center}
.flashcard{width:100%;max-width:680px;height:280px;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1);cursor:pointer}
.flashcard.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:10px;padding:28px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;border:1px solid var(--border)}
.fc-front{background:var(--panel)}
.fc-back{background:#0f172a;transform:rotateY(180deg)}
.fc-lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--txt2);margin-bottom:10px}
.fc-txt{font-size:15px;font-weight:500;line-height:1.6}
.fc-code{font-family:var(--mono);font-size:12px;background:var(--bg);padding:8px 12px;border-radius:5px;border:1px solid var(--border);margin-top:8px;text-align:left;width:100%}
.fc-status{display:flex;justify-content:center;gap:8px;margin-top:14px}
.fcs-btn{padding:7px 16px;border-radius:6px;border:none;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:700;transition:all .2s}
.fcs-review{background:rgba(239,68,68,.15);border:1px solid var(--err);color:var(--err)}
.fcs-med{background:rgba(245,158,11,.15);border:1px solid var(--warn);color:var(--warn)}
.fcs-ok{background:rgba(34,197,94,.15);border:1px solid var(--ok);color:var(--ok)}
.cheat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:14px}
.cc{background:var(--panel);border:1px solid var(--border);border-radius:8px;overflow:hidden;break-inside:avoid}
.cc-h{padding:10px 14px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.cc-h h3{font-size:13px;font-weight:700;color:var(--accent2)}
.copy-btn{padding:3px 9px;background:none;border:1px solid var(--border);border-radius:4px;color:var(--txt2);cursor:pointer;font-size:11px;font-family:var(--mono);transition:all .2s}
.copy-btn:hover{border-color:var(--accent);color:var(--accent)}
.cc-b{padding:12px 14px;font-size:13px}
.ci{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(35,40,56,.5);gap:10px;align-items:flex-start}
.ci:last-child{border-bottom:none}
.ci-k{color:var(--txt2);font-size:12px;max-width:140px;flex-shrink:0}
.ci-v{font-family:var(--mono);font-size:12px;color:var(--txt);text-align:right}
.ci-v.ac{color:var(--accent2)}
.cs{font-family:var(--mono);font-size:12px;padding:8px;background:var(--bg);border-radius:4px;border:1px solid var(--border);margin-top:6px;overflow-x:auto;white-space:pre;display:block}
.trap-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:18px;margin-bottom:12px;border-left:4px solid var(--err)}
.trap-card.w{border-left-color:var(--warn)}
.trap-card.i{border-left-color:var(--accent)}
.tc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.tc-cat{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.severity{display:flex;gap:3px;align-items:center}
.s-dot{width:7px;height:7px;border-radius:50%}
.tw .lbl{font-size:11px;color:var(--err);font-weight:700;text-transform:uppercase;margin-bottom:3px}
.tc .lbl{font-size:11px;color:var(--ok);font-weight:700;text-transform:uppercase;margin-bottom:3px}
.tc-rule{margin-top:8px;padding:9px;background:rgba(139,92,246,.08);border-radius:5px;font-size:13px;border-left:2px solid var(--accent)}
.collapsible{overflow:hidden;max-height:0;transition:max-height .4s ease}
.collapsible.open{max-height:3000px}
.coll-btn{display:flex;align-items:center;gap:7px;padding:8px 13px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--txt2);cursor:pointer;font-family:var(--font);font-size:13px;font-weight:600;transition:all .2s;margin-top:9px;width:auto}
.coll-btn:hover{border-color:var(--accent);color:var(--accent2)}
.coll-btn .arr{transition:transform .3s}
.coll-btn.open .arr{transform:rotate(90deg)}
.jump-idx{display:flex;gap:6px;flex-wrap:wrap;padding:10px;background:var(--panel);border:1px solid var(--border);border-radius:7px;margin-bottom:18px}
.j-link{color:var(--accent2);font-size:12px;cursor:pointer;padding:2px 7px;border-radius:4px;transition:background .2s;background:none;border:none;font-family:var(--font)}
.j-link:hover{background:rgba(139,92,246,.15)}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:2000;display:none;place-items:center}
.modal-ov.open{display:grid}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:26px;max-width:620px;width:90%;max-height:88vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:700;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
textarea.code-area{width:100%;min-height:110px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--txt);font-family:var(--mono);font-size:13px;padding:10px;resize:vertical;transition:border .2s}
textarea.code-area:focus{outline:none;border-color:var(--accent)}
.ex-problem{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px;margin:10px 0;font-size:14px}
.r-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin:16px 0}
.r-card{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:14px;text-align:center}
.r-card .big{font-size:34px;font-weight:800}
.big.good{color:var(--ok)}.big.mid{color:var(--warn)}.big.bad{color:var(--err)}
.hamburger{display:none;background:none;border:none;color:var(--txt);font-size:22px;cursor:pointer;padding:0 14px;height:48px}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:950;display:none;backdrop-filter:blur(2px)}
.sidebar-overlay.open{display:block}
@media(max-width:850px){nav{flex-wrap:wrap;padding:4px 0}.hamburger{display:block}.nav-brand{border-right:none;padding-left:0;flex:1}.nav-right{width:100%;border-left:none;border-top:1px solid var(--border);padding:8px 16px;justify-content:space-between;margin-top:4px;flex-wrap:wrap;gap:8px}.kbd-btn{display:none}.nav-tabs{position:fixed;top:0;left:-260px;width:260px;height:100vh;background:var(--panel);border-right:1px solid var(--border);border-top:none;flex-direction:column;z-index:1000;transition:left .3s cubic-bezier(.4,0,.2,1);padding-top:20px;overflow-y:auto;align-items:stretch}.nav-tabs.open{left:0}.tab-btn{width:100%;text-align:left;border-bottom:none;border-left:3px solid transparent;padding:15px 20px;height:auto;font-size:14px}.tab-btn.active{border-bottom:none;border-left-color:var(--accent);background:rgba(139,92,246,.07)}.flashcard{height:240px}.fc-txt{font-size:13px}main{padding:14px 10px}#search-box{flex:1;max-width:none;order:3;margin-left:0}#streak-counter{order:1}#session-clock{order:2}.qn-btn{width:38px;height:38px;font-size:14px}.f-btn{padding:8px 16px;font-size:13px}.btn{min-height:40px}.yd-credit{display:none}.toast{bottom:90px}}
@media print{nav,#scroll-prog,.f-btn,.filter-bar,.btn,.fc-status,.q-nav,.coll-btn,textarea{display:none!important}body{background:#fff;color:#000}.cc{break-inside:avoid;border:1px solid #ccc}.cc-h{background:#f3f4f6}pre,.cs,code{background:#f9fafb;border:1px solid #ddd}}
.empty{text-align:center;padding:60px 24px;background:rgba(139,92,246,.03);border:1px solid rgba(139,92,246,.1);border-radius:16px;margin-top:16px;animation:fi .22s ease}
.empty-icon{font-size:48px;display:block;margin-bottom:16px;line-height:1;opacity:0.8}
.empty-title{font-size:16px;font-weight:700;color:var(--txt);margin-bottom:8px}
.empty-sub{font-size:13px;color:var(--txt2);line-height:1.6}
#session-clock{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--txt2);padding:4px 9px;background:var(--bg);border:1px solid var(--border);border-radius:6px;white-space:nowrap;letter-spacing:.5px}
#session-clock.active{color:var(--accent);border-color:rgba(139,92,246,.4)}
.kbd-btn{padding:5px 9px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--txt2);cursor:pointer;font-size:14px;line-height:1;transition:all .2s}
.kbd-btn:hover{border-color:var(--accent);color:var(--accent)}
.toast{position:fixed;bottom:80px;right:24px;background:var(--ok);color:#fff;padding:12px 20px;border-radius:8px;font-weight:600;font-size:13px;box-shadow:0 10px 25px rgba(0,0,0,.5);transform:translateY(100px);opacity:0;transition:all .3s cubic-bezier(.4,0,.2,1);z-index:9999;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.yd-credit{position:fixed;bottom:24px;right:24px;display:flex;align-items:center;background:rgba(24,24,27,.8);backdrop-filter:blur(12px);border:1px solid rgba(139,92,246,.2);border-radius:30px;padding:8px 14px;cursor:pointer;transition:all .4s cubic-bezier(.4,0,.2,1);overflow:hidden;z-index:900;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.yd-credit:hover{background:rgba(139,92,246,.1);border-color:rgba(139,92,246,.5);box-shadow:0 4px 20px rgba(139,92,246,.2);padding-right:20px}
.yd-monogram{font-family:var(--font);font-weight:700;font-size:12px;color:var(--accent);letter-spacing:1px}
.yd-full{font-family:var(--font);font-size:12px;color:var(--accent2);white-space:nowrap;max-width:0;opacity:0;transition:all .4s cubic-bezier(.4,0,.2,1);overflow:hidden}
.yd-credit:hover .yd-full{max-width:200px;opacity:1;margin-left:10px}
.kb-table{width:100%;border-collapse:collapse;font-size:13px}
.kb-table tr{border-bottom:1px solid var(--border)}
.kb-table tr:last-child{border-bottom:none}
.kb-table td{padding:8px 4px}
.kb-table td:first-child{color:var(--txt2)}
.kb-table td:last-child{text-align:right;white-space:nowrap}
kbd{display:inline-block;background:var(--bg);border:1px solid var(--border);border-bottom-width:2px;border-radius:4px;padding:1px 6px;font-family:var(--mono);font-size:11px;color:var(--txt2)}

</style>
</head>
<body>
<div id="scroll-prog"></div>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
<nav>
  <button class="hamburger" onclick="toggleSidebar()">☰</button>
  <div class="nav-brand">⚡ IoT VIP Pro</div>
  <div class="nav-tabs">
    <button class="tab-btn active" data-tab="qcm">① QCM</button>
    <button class="tab-btn" data-tab="flashcards">② Flashcards</button>
    <button class="tab-btn" data-tab="cheatsheet">③ Cheat Sheet</button>
    <button class="tab-btn" data-tab="traps">④ Pièges d'exam</button>
  </div>
  <div class="nav-right" style="gap:8px">

    <div id="streak-counter" title="Série de révision (jours consécutifs)" style="font-size:13px;font-weight:700;color:var(--warn);display:flex;align-items:center;gap:4px">
      <span style="font-size:16px">🔥</span> <span id="streak-val">0</span>
    </div>
    <span id="session-clock" title="Temps de révision cette session">00:00</span>
    <input type="text" id="search-box" placeholder="🔍 Rechercher…">
    <button class="kbd-btn" onclick="showShortcuts()" title="Raccourcis clavier">⌨️</button>
  </div>
</nav>
<main>
  <div id="tab-qcm" class="tab-panel active"></div>

  <div id="tab-cheatsheet" class="tab-panel"></div>

<script>
/* === DATA === */
const Q=[
{id:1,ch:"Intro",diff:"easy",q:"Qu'est-ce que l'IoT ?",opts:["Extension d'Internet aux objets physiques : collecter/agir sans intervention humaine","Un réseau social","Un protocole de routage","Une base de données Cloud"],ans:0,expl:"L'IoT étend Internet au monde physique : les objets collectent des données, communiquent et agissent de manière autonome.",trap:""},
{id:2,ch:"Intro",diff:"med",q:"Relation entre M2M et IoT ?",opts:["Identiques","IoT = M2M + Services intelligents + Objets connectés. IoT est le sur-ensemble.","M2M remplace l'IoT","M2M = WiFi uniquement"],ans:1,expl:"M2M désigne la communication basique entre machines. L'IoT y ajoute l'intelligence, les services cloud et l'intégration applicative.",trap:"M2M est inclus dans IoT, pas son synonyme."},
{id:3,ch:"Intro",diff:"easy",q:"Quels sont les 6 composants essentiels d'un système IoT (Mnémo : ACCITR) ?",opts:["Authentification, Capteurs, Connexion, Intégration, Traitement, Réseaux","Alimentation, Câbles, Cloud, Internet, TCP, Routeurs","Application, Contrôle, Code, IA, Temps-réel, Radio","Antennes, Capteurs, Condensateurs, Interrupteurs, Transistors, Résistances"],ans:0,expl:"ACCITR : Authentification, Capteurs, Connexion, Intégration, Traitement, Réseaux.",trap:""},
{id:4,ch:"Intro",diff:"easy",q:"Quel est le rôle d'un actionneur dans un système IoT ?",opts:["Mesurer la température","Permettre au système d'agir sur le monde physique","Fournir l'énergie à la batterie","Connecter l'objet au WiFi"],ans:1,expl:"Un actionneur transforme un signal électrique en une action physique (allumer une lumière, ouvrir une vanne, etc.).",trap:"Ne pas confondre capteur (mesure le monde réel) et actionneur (agit sur le monde réel)."},
{id:5,ch:"Hardware",diff:"easy",q:"Parmi ces cartes, laquelle possède le Wi-Fi et le Bluetooth intégrés nativement ?",opts:["Arduino Uno","ESP32","STM32 (modèle de base)","BeagleBone"],ans:1,expl:"L'ESP32 intègre nativement Wi-Fi (802.11 b/g/n) et Bluetooth (4.2/BLE), ce qui le rend idéal pour l'IoT.",trap:"Arduino Uno nécessite un shield (module externe) pour le Wi-Fi/Bluetooth."},
{id:6,ch:"Hardware",diff:"med",q:"Dans l'IoT, quelle est la source principale de consommation d'énergie d'un capteur ?",opts:["Le traitement local (CPU)","La transmission radio","Le capteur lui-même","La mémoire Flash"],ans:1,expl:"La transmission radio (envoyer et recevoir des ondes) est l'opération la plus énergivore.",trap:"Le CPU consomme beaucoup moins que la puce radio."},
{id:7,ch:"Hardware",diff:"med",q:"Quel mécanisme permet aux objets IoT sur batterie de durer plusieurs années ?",opts:["Le Duty Cycle (dormir la plupart du temps)","Augmenter la fréquence du processeur","Utiliser uniquement le Wi-Fi","Supprimer la mémoire RAM"],ans:0,expl:"Le Duty Cycle (cycle de service) : l'objet est en mode 'deep sleep' (sommeil profond, <10 µA) 99% du temps et ne se réveille que pour mesurer et transmettre.",trap:""},
{id:8,ch:"Reseaux",diff:"easy",q:"Quelle technologie utiliser pour une très longue portée et une faible consommation, mais un faible débit ?",opts:["Wi-Fi","LPWAN (ex: LoRa, Sigfox)","5G","Bluetooth (BLE)"],ans:1,expl:"Les LPWAN (Low Power Wide Area Network) sont conçus spécifiquement pour longue portée, faible consommation et faible débit.",trap:""},
{id:9,ch:"Reseaux",diff:"med",q:"Laquelle de ces affirmations sur LoRa et LoRaWAN est correcte ?",opts:["LoRa est la couche réseau, LoRaWAN est la modulation radio","LoRa = modulation physique (PHY), LoRaWAN = protocole réseau (MAC)","LoRa est payant, LoRaWAN est gratuit","Ce sont deux protocoles concurrents différents"],ans:1,expl:"LoRa est la technologie radio (couche physique propriétaire Semtech). LoRaWAN est le protocole réseau ouvert défini par la LoRa Alliance.",trap:"Piège classique : inverser les rôles de LoRa et LoRaWAN."},
{id:10,ch:"Reseaux",diff:"hard",q:"Quelle est la topologie d'un réseau LoRaWAN ?",opts:["Maillée (Mesh)","Anneau (Ring)","Étoile d'étoiles (Star-of-stars)","Bus"],ans:2,expl:"Topologie étoile d'étoiles : les capteurs communiquent avec les Gateways, qui eux communiquent avec le Network Server.",trap:"Contrairement à Zigbee qui est maillé (Mesh), LoRaWAN ne permet pas aux capteurs de relayer les messages des autres."},
{id:11,ch:"Reseaux",diff:"med",q:"Dans LoRaWAN, quelle classe de service offre la plus faible consommation d'énergie ?",opts:["Classe A","Classe B","Classe C","Classe D"],ans:0,expl:"Classe A : l'objet écoute brièvement (2 fenêtres) juste après avoir émis. C'est le mode par défaut et le plus économe.",trap:"Classe C écoute en continu (forte consommation). Classe B s'ouvre à des moments programmés (beacons)."},
{id:12,ch:"Reseaux",diff:"med",q:"Qu'est-ce que le Spreading Factor (SF) dans LoRa ?",opts:["Le niveau de batterie de l'objet","Le niveau de sécurité du chiffrement","Le facteur d'étalement : un SF élevé augmente la portée mais réduit le débit","Le nombre d'antennes du Gateway"],ans:2,expl:"Un SF plus grand (ex: SF12) permet d'envoyer le signal plus loin (meilleure résistance au bruit), mais le temps d'émission est plus long (débit plus faible).",trap:""},
{id:13,ch:"Reseaux",diff:"med",q:"Quelle est la principale contrainte réglementaire sur les fréquences libres (ISM) utilisées par LoRaWAN/Sigfox en Europe (868 MHz) ?",opts:["Interdit aux entreprises","Le Duty Cycle : un objet ne peut émettre que 1% du temps max","Obligation de chiffrer en RSA","Limite de 10 objets par Gateway"],ans:1,expl:"Le Duty Cycle (rapport cyclique) limite le temps de parole sur ces bandes libres à 1% pour éviter la saturation du spectre.",trap:"Ce n'est pas une limitation technologique, mais réglementaire."},
{id:14,ch:"Reseaux",diff:"easy",q:"Quelle est la caractéristique du réseau Sigfox ?",opts:["C'est un réseau WiFi longue portée","C'est un réseau propriétaire géré par un opérateur unique (modèle abonnement) avec des messages très limités","C'est un standard ouvert que tout le monde peut déployer","Il permet de faire du streaming vidéo"],ans:1,expl:"Sigfox est un réseau opéré (il faut payer un abonnement à l'opérateur Sigfox). Il limite à 140 messages de 12 octets par jour (uplink).",trap:"Contrairement à LoRaWAN où on peut déployer son propre réseau privé gratuitement."},
{id:15,ch:"Reseaux",diff:"easy",q:"Qu'est-ce que le NB-IoT ?",opts:["Un réseau LPWAN basé sur les infrastructures cellulaires (télécom) existantes","Une version longue portée du Bluetooth","Un protocole de routage pour le WiFi","Un réseau par satellite"],ans:0,expl:"NB-IoT (NarrowBand IoT) est un standard LPWAN de la 3GPP qui utilise les fréquences licenciées des opérateurs télécom (LTE/4G).",trap:""},
{id:16,ch:"Reseaux",diff:"med",q:"Quel élément de l'architecture 2G (GSM) représente l'antenne ?",opts:["BSC","MSC","BTS (Base Transceiver Station)","HLR"],ans:2,expl:"La BTS est la station de base qui gère l'interface radio avec le téléphone mobile.",trap:"Le BSC contrôle plusieurs BTS. Le MSC est le commutateur central."},
{id:17,ch:"Reseaux",diff:"hard",q:"En 4G (LTE), comment s'appelle le réseau cœur et quelle est sa particularité ?",opts:["MSC, orienté circuit","EPC (Evolved Packet Core), entièrement IP (tout paquet)","SGSN, orienté ATM","5GC, basé sur les services"],ans:1,expl:"Le cœur de réseau 4G est l'EPC. Sa particularité est d'être 'Tout IP', il n'y a plus de commutation de circuit (même pour la voix : VoLTE).",trap:""},
{id:18,ch:"Reseaux",diff:"med",q:"Quelles sont les 3 grandes avancées de la 5G pour l'IoT ?",opts:["mMTC, URLLC, eMBB","HTTP, MQTT, CoAP","LoRa, Sigfox, NB-IoT","FDMA, TDMA, CDMA"],ans:0,expl:"mMTC (massive IoT), URLLC (Ultra-faible latence et haute fiabilité), eMBB (Très haut débit mobile).",trap:""},
{id:19,ch:"Reseaux",diff:"hard",q:"Qu'est-ce que le 'Network Slicing' en 5G ?",opts:["Couper les câbles réseau physiques","Partitionner virtuellement un même réseau physique pour offrir des QoS différentes selon l'usage","Augmenter la taille des paquets IP","Partager le mot de passe WiFi"],ans:1,expl:"Le découpage en tranches (Network Slicing) permet de créer des réseaux logiques indépendants sur la même infrastructure physique (ex: un slice ultra-fiable pour la santé, un slice IoT massif, etc.).",trap:""},
{id:20,ch:"Reseaux",diff:"med",q:"Innovation clé de la 4G LTE par rapport à la 3G ?",opts:["4G est plus lente","Architecture plate (eNodeB = NodeB+RNC fusionnés) + cœur Tout IP (EPC)","4G utilise encore les circuits","4G sans cœur réseau"],ans:1,expl:"4G : eNodeB intègre NodeB+RNC → architecture plate. EPC entièrement IP. Plus de commutation de circuit, même pour la voix (VoLTE).",trap:"En 3G : NodeB et RNC séparés. En 4G : fusionnés dans eNodeB."},
{id:21,ch:"Protocoles",diff:"easy",q:"Dans l'architecture MQTT, comment les producteurs et consommateurs communiquent-ils ?",opts:["Directement par IP","Via un intermédiaire central appelé Broker","Par diffusion (broadcast) WiFi","En utilisant le DNS"],ans:1,expl:"MQTT utilise un Broker centralisé. Les producteurs publient sur le Broker, les consommateurs s'y abonnent. Ils ne se connaissent pas (découplage total).",trap:""},
{id:22,ch:"Protocoles",diff:"easy",q:"Comment sont organisées les données dans MQTT ?",opts:["Par adresses IP","Par URL REST","Par Topics hiérarchiques (ex: maison/salon/temp)","Par numéros de port"],ans:2,expl:"MQTT utilise le concept de 'Topic'. Le Publisher publie sur un Topic précis, et le Subscriber s'abonne à ce même Topic.",trap:""},
{id:23,ch:"Protocoles",diff:"med",q:"Que signifie la Qualité de Service (QoS) niveau 0 dans MQTT ?",opts:["At least once (au moins une fois)","Exactly once (exactement une fois)","At most once (au plus une fois, fire-and-forget)","Aucune donnée n'est envoyée"],ans:2,expl:"QoS 0 : Le message est envoyé sans garantie de réception (pas d'accusé de réception). C'est le plus rapide mais on peut perdre des messages.",trap:"QoS 1 = Au moins une fois. QoS 2 = Exactement une fois."},
{id:24,ch:"Protocoles",diff:"med",q:"Comparé à HTTP, pourquoi MQTT est-il plus adapté à l'IoT ?",opts:["Il utilise des requêtes synchrones","Il a un overhead (entête) beaucoup plus faible et permet le Push (asynchrone)","Il est plus sécurisé par défaut","Il n'utilise pas TCP"],ans:1,expl:"MQTT a des entêtes très petits (overhead faible), maintient une connexion persistante, et permet au Broker de 'pousser' (Push) la donnée aux clients instantanément.",trap:"MQTT utilise TCP, comme HTTP."},
{id:25,ch:"Archi",diff:"easy",q:"Quelle est l'architecture classique en 4 couches d'un système IoT ?",opts:["Perception, Réseau, Service/Middleware, Application","Physique, Liaison, Réseau, Transport","Capteur, Routeur, Switch, Serveur","Edge, Fog, Cloud, Web"],ans:0,expl:"Couche 1 Perception (Capteurs), Couche 2 Réseau (Transport), Couche 3 Service (Middleware/Traitement), Couche 4 Application (Utilisateur).",trap:""},
{id:26,ch:"Archi",diff:"med",q:"Qu'est-ce que le Edge Computing dans l'IoT ?",opts:["Tout envoyer au Cloud pour traitement","Traiter la donnée localement (sur ou près du capteur) pour réduire la latence et la bande passante","Une nouvelle norme WiFi","Un service de stockage en ligne"],ans:1,expl:"Le Edge Computing consiste à déplacer la puissance de calcul 'au bord' du réseau, au plus près de la source des données.",trap:""},
{id:27,ch:"Intro",diff:"med",q:"L'identification RFID fonctionne avec :",opts:["Des puces GPS","Des tags (étiquettes) qui répondent aux ondes radio d'un lecteur","Des lasers optiques","Des signaux sonores"],ans:1,expl:"La RFID (Radio Frequency Identification) identifie un objet à distance grâce à un tag qui capte l'onde radio du lecteur et renvoie son identifiant.",trap:""},
{id:28,ch:"Hardware",diff:"hard",q:"Quelle est la différence entre une carte Arduino Uno et un Raspberry Pi ?",opts:["L'Arduino a plus de RAM","Le Raspberry Pi est un microprocesseur avec un OS complet, l'Arduino est un microcontrôleur simple","Il n'y a pas de différence, ce sont deux microcontrôleurs","L'Arduino consomme beaucoup plus"],ans:1,expl:"Un Raspberry Pi exécute un OS (Linux) et possède beaucoup de RAM/CPU. Un Arduino est un microcontrôleur qui exécute une seule boucle de code C/C++, sans OS.",trap:""},
{id:29,ch:"Reseaux",diff:"med",q:"Quel réseau sans fil est particulièrement adapté pour de la domotique grâce à son réseau maillé (mesh) ?",opts:["WiFi","LoRaWAN","Zigbee","5G"],ans:2,expl:"Zigbee est conçu pour la courte portée et utilise un réseau maillé où chaque objet (alimenté sur secteur) peut servir de relais (routeur) pour étendre la portée du réseau.",trap:"LoRaWAN est étoile d'étoiles, pas maillé."},
{id:30,ch:"Intro",diff:"easy",q:"Qu'est-ce qu'une 'Gateway' (Passerelle) dans l'IoT ?",opts:["Une antenne 5G","Un appareil qui fait le pont entre le réseau local/capteurs (ex: LoRa) et Internet (IP)","Un capteur de température","Une base de données Cloud"],ans:1,expl:"La Gateway traduit les protocoles (ex: reçoit du signal radio LoRa et l'envoie sur Internet en Ethernet/4G vers le serveur).",trap:""},
{id:31,ch:"Hardware",diff:"med",q:"Quelle est la consommation typique d'un module ESP32 en Deep Sleep ?",opts:["40-50 mA","10-15 mA","Moins de 10 µA","500 mA"],ans:2,expl:"En Deep Sleep, l'ESP32 consomme moins de 10 µA (microampères). C'est ce mode qui permet aux objets IoT de fonctionner des années sur batterie.",trap:"Ne pas confondre µA (microampères, veille) et mA (milliampères, transmission)."},
{id:32,ch:"Hardware",diff:"med",q:"Pour un projet IoT industriel (haute fiabilité, longue durée de vie), quelle famille de carte est la plus recommandée ?",opts:["Arduino Uno : le plus simple","STM32 : ARM Cortex-M, robustesse industrielle, excellente gestion d'énergie","Raspberry Pi : Linux complet","ESP8266 : WiFi basique"],ans:1,expl:"STM32 est la référence pour l'industrie : performance élevée, modes d'économie d'énergie avancés (Stop/Standby), robustesse, et certains modèles intègrent LoRa nativement.",trap:""},
{id:33,ch:"Hardware",diff:"med",q:"Quelle est la principale limite de l'Arduino Uno pour les projets IoT connectés ?",opts:["Il est trop puissant pour l'IoT","Il est trop cher","Il n'a aucune connectivité réseau native (WiFi/Bluetooth) : il faut des modules externes","Il ne peut pas lire de capteurs"],ans:2,expl:"L'Arduino Uno est idéal pour le prototypage et l'apprentissage, mais il nécessite des shields (modules externes) pour toute connectivité réseau. Contrairement à l'ESP32 qui l'intègre nativement.",trap:""},
{id:34,ch:"Hardware",diff:"med",q:"Quel est l'avantage principal de l'ESP32 par rapport à l'Arduino Uno pour l'IoT ?",opts:["L'Arduino est plus rapide","L'ESP32 intègre Wi-Fi et Bluetooth nativement","L'Arduino consomme moins","L'ESP32 a plus de pins GPIO"],ans:1,expl:"L'avantage majeur de l'ESP32 est son Wi-Fi 802.11 b/g/n ET Bluetooth 4.2/BLE intégrés nativement, sans module externe.",trap:""},
{id:35,ch:"Reseaux",diff:"easy",q:"Quelle fréquence radio est utilisée par LoRaWAN en Europe ?",opts:["2.4 GHz","5 GHz","868 MHz","1800 MHz"],ans:2,expl:"En Europe, LoRaWAN utilise la bande 868 MHz (bande ISM libre). Aux USA : 915 MHz.",trap:"2.4 GHz = WiFi/Zigbee/BLE. 1800 MHz = 2G/4G (licencié)."},
{id:36,ch:"Reseaux",diff:"hard",q:"Dans l'architecture LoRaWAN, quelle entité supprime les doublons de messages reçus par plusieurs Gateways ?",opts:["L'Application Server","Le capteur lui-même","Le Network Server","La Gateway principale"],ans:2,expl:"Le Network Server reçoit les messages de toutes les Gateways, déduplique (un capteur peut être reçu par plusieurs gateways), gère l'ADR et achemine vers l'Application Server.",trap:""},
{id:37,ch:"Reseaux",diff:"med",q:"Qu'est-ce que l'ADR (Adaptive Data Rate) dans LoRaWAN ?",opts:["Un système d'alerte","Mécanisme qui ajuste automatiquement le SF pour optimiser débit et consommation","Un type d'adressage IP","Un protocole de sécurité"],ans:1,expl:"L'ADR permet au Network Server d'ajuster automatiquement le Spreading Factor des capteurs selon la qualité du signal. Optimise débit et durée de vie batterie.",trap:""},
{id:38,ch:"Reseaux",diff:"easy",q:"Quelle est la différence LoRaWAN vs NB-IoT sur l'infrastructure ?",opts:["LoRaWAN nécessite abonnement","LoRaWAN : fréquences ISM libres, réseau privé possible. NB-IoT : fréquences licenciées, opérateur télécom obligatoire.","Infrastructure identique","NB-IoT uniquement en Europe"],ans:1,expl:"LoRaWAN : 868 MHz libre (ISM), pas d'abonnement, réseau privé déployable. NB-IoT : sur réseau cellulaire LTE, opérateur requis, fréquences payantes.",trap:""},
{id:39,ch:"Reseaux",diff:"easy",q:"Contrainte principale du réseau Sigfox ?",opts:["Uniquement en intérieur","Opérateur unique (abonnement) + max 140 messages/jour de 12 octets","Plus cher que 5G","Ne supporte pas IoT"],ans:1,expl:"Sigfox = opérateur unique (abonnement obligatoire) + limite stricte 140 msg uplink/jour, 12 octets max. Idéal alertes rares, tracking simple.",trap:"LoRaWAN : réseau privé possible sans abonnement."},
{id:40,ch:"Reseaux",diff:"easy",q:"Meilleur choix pour wearables et capteurs médicaux portables ?",opts:["LoRaWAN","Sigfox","Bluetooth BLE : faible conso, portée chambre, communication directe avec smartphone","5G mmWave"],ans:2,expl:"BLE = batterie des semaines, portée 10-100m suffisante, communication directe avec tablettes/smartphones. Standard médical courant pour wearables.",trap:""},
{id:41,ch:"Protocoles",diff:"easy",q:"Architecture du protocole MQTT ?",opts:["Client-Serveur comme HTTP","Publish/Subscribe via Broker central : publishers et subscribers découplés","Peer-to-peer direct","Maître-esclave"],ans:1,expl:"MQTT = Pub/Sub. Publisher envoie au Broker sur un Topic. Subscribers abonnés reçoivent automatiquement. Découplage total entre émetteur et récepteur.",trap:""},
{id:42,ch:"Protocoles",diff:"med",q:"Les 3 niveaux QoS MQTT et leurs garanties ?",opts:["Bas/Moyen/Haut","QoS 0: au plus une fois (peut perdre). QoS 1: au moins une fois (peut dupliquer). QoS 2: exactement une fois (garanti).","Lent/Normal/Rapide","Non chiffré/Chiffré/Double chiffrement"],ans:1,expl:"QoS 0 = fire and forget (données non critiques). QoS 1 = garanti mais doublon possible (alertes). QoS 2 = garanti unique (transactions critiques).",trap:"QoS 0 n'est PAS 'au moins une fois'. C'est 'au plus une fois'."},
{id:43,ch:"Protocoles",diff:"med",q:"Quel protocole IoT utilise UDP (pas TCP) pour être encore plus léger ?",opts:["MQTT","HTTP","AMQP","CoAP"],ans:3,expl:"CoAP (Constrained Application Protocol) = HTTP allégé sur UDP. Idéal objets très contraints (peu de mémoire). Supporte REST (GET/POST/PUT/DELETE).",trap:"MQTT utilise TCP. CoAP utilise UDP. Ne pas confondre."},
{id:44,ch:"Reseaux",diff:"med",q:"Quelle règle résume le compromis portée/débit/consommation IoT ?",opts:["Plus de débit = plus de portée","Débit faible → portée grande → consommation faible : principe des LPWAN","Débit et portée sont indépendants","Plus de débit = moins de consommation"],ans:1,expl:"Règle d'or IoT : réduire le débit augmente la portée et réduit la consommation. C'est le fondement des LPWAN. SF élevé dans LoRa illustre ce principe.",trap:""},
{id:45,ch:"Archi",diff:"hard",q:"[CAS] 50 capteurs d'humidité sur 5 km² de champs, batterie longue durée. Quelle technologie ?",opts:["WiFi : haut débit","5G : couverture nationale","LoRaWAN : longue portée, faible conso, petits messages, pas d'abonnement opérateur","Bluetooth : communication directe"],ans:2,expl:"LoRaWAN : portée 2-15 km, batterie des années, petits messages (temp/humidité), réseau privé sans abonnement. Cas d'usage parfait agriculture IoT.",trap:"WiFi consomme trop. BT trop court. 5G coûteux et inutile pour de petits messages."},
{id:46,ch:"Reseaux",diff:"med",q:"Dans le contexte 5G IoT, que signifie URLLC ?",opts:["Universal Radio Link Layer Control","Ultra-Reliable Low-Latency Communications","Ultra Range Long Life Communications","Unified Radio Link and Latency Control"],ans:1,expl:"URLLC = Ultra-Reliable Low-Latency Communications. Cible les applications critiques : chirurgie à distance, véhicules autonomes, industrie 4.0. Latence <1 ms, fiabilité 99.9999%.",trap:""},
{id:47,ch:"Reseaux",diff:"easy",q:"Quelle est la latence approximative d'un réseau 4G LTE ?",opts:["1 ms","500 ms","30-50 ms","1 seconde"],ans:2,expl:"La 4G LTE offre une latence de ~30-50 ms. La 3G était ~100 ms. La 5G vise <1 ms.",trap:""},
{id:48,ch:"Reseaux",diff:"med",q:"Dans l'architecture 2G GSM, quelle est la différence entre HLR et VLR ?",opts:["Ils ont le même rôle","HLR = base de données permanente des abonnés. VLR = copie temporaire pour les abonnés en déplacement.","VLR stocke les données permanentes","HLR gère les antennes radio"],ans:1,expl:"HLR (Home Location Register) = profil permanent de l'abonné chez son opérateur. VLR (Visitor Location Register) = copie temporaire créée quand l'abonné entre dans une nouvelle zone.",trap:"HLR = permanent. VLR = temporaire (itinérance)."},
{id:49,ch:"Reseaux",diff:"med",q:"Quelle est la principale différence entre la commutation de circuits et la commutation de paquets ?",opts:["La commutation de circuits est plus rapide","La commutation de circuits réserve un canal dédié (voix 2G), la commutation de paquets partage la bande passante (IP)","La commutation de paquets ne peut pas transporter la voix","Elles sont identiques"],ans:1,expl:"Commutation de circuits (2G voix) : canal dédié réservé pendant toute la communication. Commutation de paquets (GPRS, 4G) : données fragmentées en paquets, bande passante partagée.",trap:""},
{id:50,ch:"Protocoles",diff:"med",q:"Quand est-il préférable d'utiliser HTTP plutôt que MQTT dans un projet IoT ?",opts:["Jamais, MQTT est toujours meilleur","Pour les API REST, dashboards web et intégrations avec des services web existants","Pour les capteurs sur batterie en terrain isolé","Pour réduire la consommation d'énergie"],ans:1,expl:"HTTP/REST est naturel pour les API web, les dashboards et les intégrations avec systèmes tiers. MQTT est optimal pour les capteurs temps réel. Les deux sont complémentaires.",trap:""},
{id:51,ch:"Protocoles",diff:"easy",q:"Qu'est-ce qu'un Broker MQTT et citez un exemple ?",opts:["Un capteur IoT qui publie des données","Un serveur intermédiaire qui reçoit les publications et les redistribue aux abonnés. Ex: Mosquitto, HiveMQ","Un protocole de routage IP","Un type de Topic MQTT"],ans:1,expl:"Le Broker est le cœur du modèle Pub/Sub MQTT. Il reçoit les messages des Publishers et les redirige vers tous les Subscribers du même Topic. Mosquitto (open source) et HiveMQ sont les plus courants.",trap:"Le Broker ne publie pas lui-même, il redistribue."},
{id:52,ch:"Reseaux",diff:"med",q:"[CAS] Une ville installe 200 capteurs de qualité d'air. Quelle combinaison réseau + protocole est optimale ?",opts:["WiFi + HTTP : familier et simple","LoRaWAN + MQTT : longue portée batterie, données push vers dashboard","Bluetooth + CoAP : faible consommation","5G + WebSocket : ultra-rapide"],ans:1,expl:"LoRaWAN couvre toute la ville (km) avec des capteurs sur batterie (années). MQTT achemine les données vers le dashboard via Broker (push temps réel). Combo classique Smart City.",trap:"WiFi : consomme trop, portée insuffisante. 5G : surdimensionné et coûteux pour de petits messages périodiques."},
{id:53,ch:"Protocoles",diff:"easy",q:"Dans MQTT, qu'est-ce qu'un 'Topic' ?",opts:["Un message d'erreur","Un canal hiérarchique de publication/abonnement (ex: maison/salon/temp)","Le nom du Broker","Un niveau de QoS"],ans:1,expl:"Un Topic est le canal logique hiérarchique sur lequel un Publisher envoie et auquel des Subscribers s'abonnent. Ex: 'ferme/champ1/humidite'.",trap:""},
{id:54,ch:"Protocoles",diff:"med",q:"Quelle est la différence entre QoS 0, QoS 1 et QoS 2 en MQTT en termes de cas d'usage ?",opts:["Ils sont identiques, juste des niveaux de vitesse","QoS 0 : données non critiques fréquentes. QoS 1 : alertes (perte intolérable). QoS 2 : transactions uniques critiques.","QoS 2 est toujours recommandé","QoS 0 garantit la livraison"],ans:1,expl:"Choisir le bon QoS selon le besoin : température périodique → QoS 0. Alerte incendie → QoS 1. Commande de paiement → QoS 2. Utiliser QoS 2 partout est un anti-pattern (surcharge réseau).",trap:"QoS 0 ne garantit PAS la livraison."},
{id:55,ch:"Archi",diff:"med",q:"Dans l'architecture IoT 4 couches, quelle est la fonction de la couche 'Service/Middleware' ?",opts:["Détecter les données physiques","Transporter les données sur le réseau","Traiter, stocker et analyser les données","Afficher les données à l'utilisateur"],ans:2,expl:"La couche Service/Middleware (couche 3) assure le traitement, le stockage et l'analyse des données. Elle fait le lien entre le réseau et l'application.",trap:""},
{id:56,ch:"Archi",diff:"med",q:"Qu'est-ce que le 'Fog Computing' dans l'IoT ?",opts:["Un service Cloud AWS","Un intermédiaire entre Edge et Cloud : traitement dans les gateways intelligentes","Un protocole de communication","Un type de capteur météo"],ans:1,expl:"Le Fog Computing est une couche intermédiaire entre l'Edge (local) et le Cloud (centralisé). Les gateways intelligentes effectuent un prétraitement avant d'envoyer au cloud.",trap:""},
{id:57,ch:"Archi",diff:"easy",q:"Quelle est la définition d'une plateforme IoT ?",opts:["Un réseau LPWAN","Un middleware qui permet de connecter, gérer, traiter et visualiser les données des objets connectés","Un type de capteur","Un protocole de communication"],ans:1,expl:"Une plateforme IoT est un middleware intermédiaire entre les capteurs/actionneurs et les applications utilisateurs. Elle assure : gestion dispositifs, collecte, analytics, dashboard, sécurité.",trap:""},
{id:58,ch:"Archi",diff:"easy",q:"Laquelle est une plateforme IoT Open Source ?",opts:["AWS IoT Core","Azure IoT Hub","ThingsBoard","Google Cloud IoT"],ans:2,expl:"ThingsBoard est une plateforme IoT open source permettant la collecte, visualisation et gestion des données IoT. Node-RED, Mosquitto et Home Assistant sont aussi open source.",trap:"AWS IoT Core, Azure IoT Hub et Google Cloud IoT sont propriétaires (payants)."},
{id:59,ch:"Archi",diff:"med",q:"Quels sont les défis majeurs de l'IoT ?",opts:["Sécurité, interopérabilité, consommation, scalabilité, vie privée","Uniquement la consommation d'énergie","Uniquement la sécurité réseau","Uniquement le coût des capteurs"],ans:0,expl:"Les défis IoT sont multiples : sécurité (attaques), interopérabilité (hétérogénéité), consommation (batterie), scalabilité (milliards d'objets), vie privée, standardisation, Big Data.",trap:""},
{id:60,ch:"Intro",diff:"easy",q:"Quel domaine d'application IoT utilise des capteurs pour surveiller la qualité de l'air ?",opts:["Domotique","Ville intelligente (Smart City)","Commerce","Agriculture"],ans:1,expl:"La ville intelligente (Smart City) utilise des capteurs IoT pour surveiller la pollution, l'éclairage, les déchets, le trafic. Ex: capteurs PM2.5, NO2 connectés via LoRaWAN.",trap:""},
{id:61,ch:"Intro",diff:"easy",q:"Pour surveiller les conditions météo sur un champ agricole avec des capteurs sur batterie, quelle technologie est recommandée ?",opts:["WiFi","Bluetooth","LoRaWAN","5G"],ans:2,expl:"LoRaWAN est idéal : longue portée (plusieurs km de champ), très faible consommation (capteurs sur batterie des années), faible débit suffisant (température, humidité), pas d'abonnement opérateur.",trap:"WiFi consomme trop. Bluetooth a une portée trop courte. 5G est trop coûteux."},
{id:62,ch:"Reseaux",diff:"easy",q:"Quelle technologie courte portée est la plus adaptée pour des wearables (montres, bracelets connectés) ?",opts:["LoRaWAN","WiFi","Bluetooth BLE","Sigfox"],ans:2,expl:"BLE (Bluetooth Low Energy) est idéal pour les wearables : faible consommation, portée ~10-100m, communication avec smartphone, autonomie de mois.",trap:""},
{id:63,ch:"Reseaux",diff:"med",q:"Comment évoluent les débits et la latence des générations mobiles de la 2G à la 5G ?",opts:["Les débits et latences n'ont pas évolué","2G: kbps/500ms → 3G: Mbps/100ms → 4G: 100Mbps/30ms → 5G: Gbps/<1ms","La 5G est plus lente que la 4G","Les latences sont identiques pour toutes les générations"],ans:1,expl:"Chaque génération multiplie le débit par ~100 et divise la latence par ~10. 5G cible <1ms pour les applications critiques (URLLC).",trap:""},
{id:64,ch:"Reseaux",diff:"med",q:"Qu'est-ce que le Massive MIMO dans la 5G et quel est son avantage pour l'IoT ?",opts:["Un protocole de sécurité","Des centaines d'antennes qui permettent de desservir simultanémément de nombreux appareils (IoT massif)","Un type de batterie","Un algorithme de routage"],ans:1,expl:"Massive MIMO (Multiple Input Multiple Output) utilise des dizaines/centaines d'antennes pour multiplier la capacité. Crucial pour mMTC : connecter des milliers d'objets IoT dans une même zone.",trap:""},
{id:65,ch:"Reseaux",diff:"easy",q:"Qu'est-ce que le Beamforming en 5G et pourquoi est-il utile pour l'IoT ?",opts:["Un protocole de sécurité","Une technique de routage IP","Diriger le signal radio vers un appareil spécifique pour améliorer la portée et réduire les interférences","Un mode d'économie d'énergie"],ans:2,expl:"Le Beamforming dirige le signal 5G précisément vers l'utilisateur au lieu de le diffuser. En IoT massif (mMTC), cela permet de desservir plus d'appareils dans la même zone sans interférences.",trap:""},
{id:66,ch:"Protocoles",diff:"hard",q:"Un capteur IoT envoie des données de température toutes les heures. MQTT QoS 0 ou 1 est recommandé ?",opts:["QoS 2, pour ne jamais perdre de données","QoS 0, les données non critiques et fréquentes tolèrent la perte","QoS 1 car la température est critique","HTTP car c'est plus fiable"],ans:1,expl:"Pour des données non critiques envoyées fréquemment (température/heure), QoS 0 est suffisant. Une mesure perdue sera compensée par la suivante. QoS 2 surchargerait inutilement le réseau.",trap:""},
{id:67,ch:"Archi",diff:"med",q:"Dans le flux de données IoT, quelle étape vient après la collecte par les capteurs ?",opts:["L'affichage à l'utilisateur","L'action sur les actionneurs","La transmission via le réseau","Le traitement en cloud"],ans:2,expl:"Le flux IoT classique : 1.Collecte (capteurs) → 2.Transmission (réseau) → 3.Traitement (cloud/edge) → 4.Action (actionneurs) → 5.Feedback (utilisateur).",trap:""},
{id:68,ch:"Reseaux",diff:"med",q:"Qu'est-ce que le GPRS (2.5G) par rapport au GSM (2G) ?",opts:["Une version plus lente du GSM","L'extension du GSM pour les données IP par commutation de paquets","Un réseau 3G UMTS","Un protocole WiFi longue portée"],ans:1,expl:"GPRS (General Packet Radio Service) est une extension du GSM qui ajoute la commutation de paquets pour accéder à Internet. Débit : 14.4 à 115.2 kbps.",trap:""},
{id:69,ch:"Reseaux",diff:"med",q:"Comment l'architecture du cœur réseau évolue-t-elle de la 3G à la 4G ?",opts:["Aucun changement","3G : NodeB + RNC séparés + cœur mixte voix/données. 4G : eNodeB = NodeB+RNC fusionnés + EPC Tout IP","4G utilise encore la commutation de circuits pour la voix","3G est plus rapide que 4G"],ans:1,expl:"En 4G, le RNC disparaît et ses fonctions sont intégrées dans l'eNodeB (architecture plate). Le cœur EPC est entièrement IP : la voix passe par VoLTE, plus par des circuits.",trap:""},
{id:70,ch:"Intro",diff:"med",q:"Quelle caractéristique distingue un 'terminal intelligent' des autres catégories d'objets connectés ?",opts:["Il communique par RFID uniquement","Il inclut un traitement informatique intégré (microprocesseur/microcontrôleur)","Il ne peut pas communiquer par réseau","Il est exclusivement utilisé en industrie"],ans:1,expl:"Un terminal intelligent (ex: ESP32, Arduino) intègre un processeur pour traitement local, contrairement à un simple tag RFID (identification) ou un objet M2M basique.",trap:""},
{id:71,ch:"Reseaux",diff:"med",q:"Quelle est la portée typique de WiFi en intérieur ?",opts:["10 km","2 km","~200m","50 km"],ans:2,expl:"Le WiFi a une portée d'environ 100-200m en intérieur. C'est une technologie courte portée, contrairement aux LPWAN (km).",trap:""},
{id:72,ch:"Hardware",diff:"med",q:"Dans quel cas pratique choisit-on l'Arduino Uno plutôt que l'ESP32 ?",opts:["Pour un projet IoT connecté en WiFi","Pour le prototypage rapide local sans besoin réseau, apprentissage débutant, ou contrôle de moteur simple","Pour un déploiement industriel","Pour un projet LoRa avec batterie"],ans:1,expl:"Arduino = facilité maximale, code C simple, pas d'OS. Idéal apprentissage et prototypes sans connectivité. Dès qu'on a besoin de WiFi/BT, l'ESP32 est préférable (équivalent prix, plus puissant).",trap:""},
{id:73,ch:"Archi",diff:"easy",q:"Citez 3 domaines d'application de l'IoT.",opts:["Réseaux sociaux, jeux vidéo, streaming","Smart City, e-Santé, Agriculture intelligente","DNS, HTTP, FTP","TCP, UDP, IP"],ans:1,expl:"IoT : Smart City (trafic, éclairage), e-Santé (monitoring patient, télémédecine), Agriculture (capteurs champs, irrigation auto), Industrie 4.0, Domotique, Logistique.",trap:""},
{id:74,ch:"Reseaux",diff:"med",q:"Quel critère est le PLUS important pour choisir LoRaWAN plutôt que WiFi dans un déploiement IoT en plein air ?",opts:["Le débit élevé","La portée longue distance et la faible consommation sur batterie","La vitesse de connexion instantanée","Le nombre d'objets connectés simultanément"],ans:1,expl:"LoRaWAN est choisi pour sa longue portée (km) et sa très faible consommation permettant des années de fonctionnement sur batterie, impossible avec WiFi.",trap:""},
{id:75,ch:"Protocoles",diff:"hard",q:"Quel est l'avantage de WebSocket par rapport à HTTP classique pour l'IoT temps réel ?",opts:["WebSocket est plus sécurisé","WebSocket maintient une connexion persistante bidirectionnelle permettant le Push du serveur vers le client","WebSocket utilise moins de bande passante","WebSocket fonctionne sans Internet"],ans:1,expl:"WebSocket établit une connexion persistante et bidirectionnelle : le serveur peut envoyer des données au client sans que celui-ci ne les demande (Push). Idéal pour les dashboards temps réel.",trap:"HTTP classique est stateless : le client doit constamment faire des requêtes (polling) pour avoir les nouvelles données."}
];
const FC=[
{id:101,ch:"Intro",front:"IoT (définition)",back:"Extension d'Internet aux objets physiques : collecte, transmission, traitement de données SANS intervention humaine directe.",code:""},
{id:102,ch:"Intro",front:"M2M vs IoT",back:"M2M = communication machine-machine basique. IoT = M2M + Services intelligents + Objets connectés. IoT est le sur-ensemble.",code:""},
{id:103,ch:"Intro",front:"Mnémo ACCITR (6 composants IoT)",back:"Authentification · Capteurs · Connexion · Intégration · Traitement · Réseaux",code:"A-C-C-I-T-R\nChaque objet : identité unique → mesure → réseau → compatibilité → analyse → transport"},
{id:104,ch:"Intro",front:"Capteur vs Actionneur",back:"Capteur : mesure le monde physique → signal électrique (ex: thermomètre).\nActionneur : reçoit un signal → agit sur le monde (ex: allumer une pompe).",code:""},
{id:105,ch:"Intro",front:"RFID",back:"Radio Frequency Identification : identifie un objet à distance via un tag passif qui répond aux ondes d'un lecteur. Pas de batterie requise.\nUsages : inventaire, badge d'accès, logistique.",code:""},
{id:106,ch:"Intro",front:"NFC vs RFID",back:"NFC (Near Field Communication) = version RFID très courte distance (0-20 cm), bidirectionnelle.\nUsages : paiement sans contact, partage de fichiers, tags intelligents.\nRFID = portail inventaire, badge. NFC = mobile personnel.",code:""},
{id:107,ch:"Hardware",front:"ESP32 — points clés",back:"Wi-Fi + Bluetooth (BLE) intégrés nativement.\nTrès faible conso en Deep Sleep (<10 µA).\nPuissant, dual-core 32-bit.\nPrix abordable (~$3-8).\nIdéal : domotique, MQTT, tout projet IoT connecté.",code:""},
{id:108,ch:"Hardware",front:"Arduino Uno — points clés",back:"Microcontrôleur 8-bit simple. Aucune connectivité réseau native (WiFi/BT) : modules externes requis.\nFaible RAM. Idéal : apprentissage, prototypage local, contrôle de composants.",code:""},
{id:109,ch:"Hardware",front:"STM32 — points clés",back:"Microcontrôleur ARM 32-bit haute performance. Excellente gestion d'énergie (modes veille profonde). Robustesse industrielle. Certains modèles intègrent LoRa ou WiFi nativement.\nIdéal : produits industriels, IoT à longue durée de vie.",code:""},
{id:110,ch:"Hardware",front:"Comparatif : Arduino vs ESP32 vs STM32",back:"Arduino : facilité max, faibles perfs, pas WiFi natif.\nESP32 : WiFi+BT natif, haute perf, faible coût.\nSTM32 : meilleure perf, industriel, STM32WL a LoRa.",code:""},
{id:111,ch:"Hardware",front:"Deep Sleep & Duty Cycle IoT",back:"Deep Sleep : ~10 µA (microampères). L'objet dort, se réveille périodiquement pour mesurer + transmettre. Duty Cycle = % du temps actif. Ex: 1% actif → batterie dure des années.",code:"Tx LoRa : ~40-50 mA\nRx : ~10-15 mA\nSleep : <10 µA"},
{id:112,ch:"Reseaux",front:"LPWAN — définition et avantages",back:"Low Power Wide Area Network. Longue portée (km) + Très faible consommation + Faible débit + Faible coût. Exemples : LoRaWAN, Sigfox, NB-IoT.",code:"Non adapté : vidéo, streaming, temps-réel strict"},
{id:113,ch:"Reseaux",front:"LoRa vs LoRaWAN",back:"LoRa = modulation radio (couche PHYSIQUE) propriétaire Semtech. Utilise CSS (Chirp Spread Spectrum).\nLoRaWAN = protocole RÉSEAU (couche MAC) standardisé LoRa Alliance. S'appuie sur LoRa.",code:"LoRa = le signal radio\nLoRaWAN = le protocole réseau"},
{id:114,ch:"Reseaux",front:"LoRaWAN — chiffres clés",back:"Portée : 2 km (urbain) — 15 km (rural)\nFréquence : 868 MHz Europe (libre ISM)\nDébit : 0.3 à 50 kbps (selon SF)\nChiffrement : AES-128\nDuty Cycle réglementaire : max 1%\nTopologie : étoile d'étoiles",code:""},
{id:115,ch:"Reseaux",front:"LoRaWAN — Classes A, B, C",back:"Classe A : 2 fenêtres courtes après envoi → MINIMUM obligatoire, consommation la plus FAIBLE.\nClasse B : fenêtres programmées par beacons → Smart City.\nClasse C : réception quasi-continue → Industrie, consommation ÉLEVÉE.",code:""},
{id:116,ch:"Reseaux",front:"Spreading Factor (SF) LoRa",back:"SF7 → SF12. SF élevé = portée plus grande MAIS débit plus faible + temps d'émission plus long.\nSF7 : rapide, courte portée. SF12 : lent, très longue portée.",code:"SF↑ → portée↑ → débit↓ → temps_émission↑"},
{id:117,ch:"Reseaux",front:"ADR (Adaptive Data Rate) LoRaWAN",back:"LoRaWAN ajuste automatiquement le SF (et donc le débit) selon la qualité du signal reçu par le Network Server. Optimise : consommation et capacité réseau.",code:""},
{id:118,ch:"Reseaux",front:"Sigfox — caractéristiques clés",back:"Réseau propriétaire opéré (abonnement obligatoire). UNB (Ultra Narrow Band). 100 bps uplink. Portée 3-50 km. Limite : 140 msg/jour (12 octets max) uplink, 4 downlink.",code:"Vs LoRaWAN : opérateur unique vs réseau propre possible"},
{id:119,ch:"Reseaux",front:"NB-IoT",back:"NarrowBand IoT — standard 3GPP sur fréquences LICENCIÉES LTE. Opérateur télécom requis. ~200 kbps. Pas de limite de messages. Bonne couverture indoor.",code:""},
{id:120,ch:"Reseaux",front:"Zigbee",back:"Courte portée (~100m). Très faible consommation. Topologie MAILLÉE (mesh) : chaque nœud alimenté peut relayer les messages d'autres nœuds.\nIdéal : domotique, automatisation bâtiment.",code:""},
{id:121,ch:"Reseaux",front:"WiFi IoT",back:"Très haut débit. Consommation ÉLEVÉE : autonomie batterie limitée (à la journée). Idéal quand alimentation secteur disponible.\nNon adapté aux capteurs terrains sur batterie.",code:""},
{id:122,ch:"Reseaux",front:"Bluetooth BLE",back:"Bluetooth Low Energy. Portée 10-100m. Débit ~1 Mbps. Autonomie : mois. Idéal : wearables, santé, objets personnels. Moins adapté IoT grande échelle.",code:""},
{id:123,ch:"Reseaux",front:"2G GSM — architecture",back:"MS → BTS (antenne) → BSC (contrôle BTS, handover) → MSC (commutateur central)\nBases de données : HLR (permanent) + VLR (itinérance) + AUC (auth) + EIR (appareils)",code:"2G : voix par commutation de circuits. Extension GPRS = paquets IP."},
{id:124,ch:"Reseaux",front:"Rôles 2G : HLR / VLR / AUC / EIR",back:"HLR : base données abonnés PERMANENTE.\nVLR : base données abonnés en DÉPLACEMENT.\nAUC : Authentification et chiffrement.\nEIR : Registre terminaux (IMEI).",code:""},
{id:125,ch:"Reseaux",front:"3G UMTS — architecture",back:"UE → NodeB (antenne 3G) → RNC (contrôle NodeB) → Cœur : CS (voix circuits) + PS (données paquets).\nDébit : 2 Mbps typ. HSDPA (3.5G) améliore les débits.",code:""},
{id:126,ch:"Reseaux",front:"4G LTE — architecture",back:"UE → eNodeB (= NodeB + RNC fusionnés) → EPC (MME + SGW + PGW + HSS)",code:"eNodeB = architecture PLATE (flat)\nEPC = tout IP, plus de commutation circuit"},
{id:127,ch:"Reseaux",front:"4G LTE — caractéristiques",back:"Tout IP. eNodeB = NodeB+RNC fusionnés (architecture plate).\nDébit 100-150 Mbps (LTE-A : jusqu'à 1 Gbps).\nLatence ~30-50 ms. VoLTE = voix sur IP.",code:""},
{id:128,ch:"Reseaux",front:"5G — 3 grands cas d'usage IoT",back:"mMTC : connexion de MILLIARDS d'objets (IoT massif).\nURLLC : Ultra fiabilité + latence 1 ms (industrie, médical).\neMBB : Très haut débit (VR, AR, 10 Gbps).",code:""},
{id:129,ch:"Reseaux",front:"5G — architecture",back:"UE → gNodeB (station de base 5G) → 5G Core (5GC).\n5GC = architecture orientée services (SBA) : gère accès, mobilité, sessions, trafic données.",code:""},
{id:130,ch:"Reseaux",front:"5G — technologies clés",back:"Massive MIMO : centaines d'antennes, capacité élevée.\nBeamforming : signal dirigé vers l'utilisateur.\nNetwork Slicing : réseaux logiques virtualisés.\nMEC : Edge Computing intégré.",code:""},
{id:131,ch:"Reseaux",front:"Network Slicing (5G)",back:"Partitionner virtuellement UN réseau physique en plusieurs réseaux logiques indépendants, chacun avec sa propre QoS. Ex: slice IoT massif + slice chirurgie + slice eMBB.",code:""},
{id:132,ch:"Reseaux",front:"Tableau générations mobiles",back:"2G (GSM): kbps, ~500ms, voix circuit\n3G (UMTS): Mbps, ~100ms, voix+données\n4G (LTE): 100Mbps, ~30ms, Tout IP\n5G (NR): Gbps, <1ms, SBA",code:"Clé : chaque génération ×100 débit, /10 latence"},
{id:133,ch:"Protocoles",front:"MQTT — architecture",back:"Publisher → Broker ← Subscriber. Publish/Subscribe découplé. Topics hiérarchiques (ex: maison/salon/temp). Connexion persistante TCP.",code:"Port 1883 (standard) | Port 8883 (TLS)"},
{id:134,ch:"Protocoles",front:"MQTT — 3 niveaux QoS",back:"QoS 0 : At most once (fire-and-forget, peut perdre).\nQoS 1 : At least once (peut dupliquer, accusé de réception).\nQoS 2 : Exactly once (garanti, transaction critique).",code:""},
{id:135,ch:"Protocoles",front:"MQTT vs HTTP",back:"MQTT : Pub/Sub, overhead ~2 octets, persistant, temps réel ✅, asynchrone.\nHTTP : Req/Resp, headers lourds, nouvelle connexion chaque fois, synchrone.",code:"IoT → MQTT | API Web → HTTP/REST"},
{id:136,ch:"Protocoles",front:"CoAP",back:"Constrained Application Protocol. HTTP allégé pour objets contraints. Fonctionne sur UDP (pas TCP). RESTful (GET/POST/PUT/DELETE). Idéal pour IoT avec peu de mémoire.",code:""},
{id:137,ch:"Protocoles",front:"WebSocket pour IoT",back:"Connexion PERSISTANTE et BIDIRECTIONNELLE sur HTTP.\nLe serveur peut pousser des données vers le client sans attendre de requête (Push).\nIdéal : dashboards temps réel, visualisation flux IoT.",code:""},
{id:138,ch:"Archi",front:"Architecture IoT 4 couches",back:"1. Perception : capteurs, actionneurs, RFID\n2. Réseau : WiFi, LoRa, 5G, transport\n3. Service/Middleware : traitement, stockage, analyse\n4. Application : dashboard, services métier",code:""},
{id:139,ch:"Archi",front:"Edge vs Fog vs Cloud",back:"Edge : traitement LOCAL sur ou près du capteur. Latence minimale, confidentialité.\nFog : gateway intelligent entre edge et cloud.\nCloud : puissance de calcul centralisée, IA avancée, historique.",code:""},
{id:140,ch:"Archi",front:"Plateformes IoT : types et exemples",back:"Propriétaires : AWS IoT Core, Azure IoT Hub, Google Cloud IoT, IBM Watson IoT.\nOpen Source : ThingsBoard, Node-RED, Mosquitto, Home Assistant, Eclipse Kapua.",code:""}
];

const TRAPS=[
{cat:"Confusion fréquente",sev:3,ch:"Reseaux",wrong:"LoRa et LoRaWAN sont la même chose",right:"LoRa = modulation radio PHYSIQUE (propriétaire Semtech). LoRaWAN = protocole RÉSEAU (LoRa Alliance). LoRaWAN S'APPUIE sur LoRa.",why:"LoRa définit comment le signal est transmis (CSS). LoRaWAN définit comment le réseau fonctionne (authentification, classes, ADR...).",rule:"LoRa = le signal radio. LoRaWAN = le protocole réseau par-dessus."},
{cat:"Erreur classique",sev:3,ch:"Reseaux",wrong:"La Classe C LoRaWAN consomme le moins d'énergie car elle est 'complète'",right:"La Classe A est la PLUS économe (2 fenêtres courtes après envoi, dort le reste du temps). Classe C consomme le PLUS (réception quasi-continue).",why:"Classe A = minimum obligatoire pour TOUS les appareils LoRaWAN. Elle dort pratiquement tout le temps.",rule:"Classe A = moins de conso | Classe B = milieu | Classe C = plus de conso"},
{cat:"Confusion fréquente",sev:3,ch:"Reseaux",wrong:"Un SF élevé (SF12) est toujours préférable car il augmente la portée",right:"SF12 = grande portée MAIS débit très faible + temps d'émission long → consomme plus d'énergie et réduit la capacité réseau.",why:"Il faut choisir le SF minimum permettant d'atteindre la destination. L'ADR fait ce choix automatiquement.",rule:"SF élevé → portée↑ MAIS débit↓ + temps_émission↑ + conso↑. Utiliser SF minimum suffisant."},
{cat:"Erreur classique",sev:3,ch:"Reseaux",wrong:"Le Duty Cycle 1% (868 MHz) est une limitation technique du matériel",right:"Le Duty Cycle de 1% est une CONTRAINTE RÉGLEMENTAIRE européenne (ETSI), pas une limitation technologique.",why:"La réglementation limite l'utilisation des bandes ISM libres pour éviter la saturation du spectre partagé.",rule:"Duty cycle = réglementaire (ETSI Europe), pas technologique."},
{cat:"Confusion fréquente",sev:3,ch:"Reseaux",wrong:"Sigfox et LoRaWAN sont équivalents : on peut déployer son propre réseau Sigfox",right:"Sigfox est un réseau opéré par UN seul opérateur (abonnement obligatoire). LoRaWAN peut être déployé en réseau PRIVÉ sans opérateur.",why:"Sigfox = modèle opérateur fermé (comme un opérateur télécom). LoRaWAN = standard ouvert, réseau propre possible.",rule:"Sigfox → opérateur unique, abonnement. LoRaWAN → réseau privé possible, standard ouvert."},
{cat:"Erreur classique",sev:3,ch:"Reseaux",wrong:"Zigbee utilise une topologie en étoile comme LoRaWAN",right:"Zigbee utilise un réseau MAILLÉ (mesh) où chaque nœud alimenté peut servir de routeur. LoRaWAN utilise une étoile d'étoiles.",why:"Le mesh Zigbee permet d'étendre la portée grâce aux relais entre objets. LoRaWAN ne permet pas ce relayage inter-capteurs.",rule:"Zigbee = mesh. LoRaWAN = star-of-stars. NE PAS inverser."},
{cat:"Confusion fréquente",sev:3,ch:"Reseaux",wrong:"NB-IoT utilise les fréquences libres ISM comme LoRa",right:"NB-IoT utilise des fréquences LICENCIÉES LTE (opérateur télécom obligatoire). LoRaWAN et Sigfox utilisent les bandes ISM libres.",why:"C'est un critère différenciateur clé. NB-IoT = réseau cellulaire, opérateur requis, fréquences payantes.",rule:"LoRaWAN/Sigfox → ISM libre 868 MHz. NB-IoT → fréquences licenciées LTE."},
{cat:"Erreur classique",sev:3,ch:"Reseaux",wrong:"eNodeB (4G) est juste l'équivalent du NodeB (3G)",right:"eNodeB = NodeB + RNC FUSIONNÉS. Il intègre les fonctions de contrôle radio (RNC) en plus de l'antenne. Architecture plate (flat).",why:"En 4G, on supprime la couche RNC → architecture plus plate et plus efficace (moins de latence).",rule:"3G : NodeB + RNC séparés. 4G : eNodeB = NodeB+RNC fusionnés → flat architecture."},
{cat:"Confusion fréquente",sev:3,ch:"Reseaux",wrong:"En 4G, la voix utilise encore la commutation de circuits",right:"La 4G est TOUT IP. La voix passe par VoLTE (Voice over LTE), en commutation de paquets IP. Plus de circuit switching.",why:"L'EPC (Evolved Packet Core) est un cœur réseau entièrement IP. La 2G et 3G utilisaient la commutation de circuits pour la voix.",rule:"4G = Tout IP (voix = VoLTE). 2G/3G = circuits pour voix + paquets pour données."},
{cat:"Erreur classique",sev:3,ch:"Protocoles",wrong:"MQTT utilise UDP pour sa légèreté",right:"MQTT fonctionne sur TCP (fiable, connexion persistante). C'est CoAP qui utilise UDP.",why:"MQTT est conçu pour des connexions persistantes et fiables via TCP. La légèreté de MQTT vient de ses petits headers, pas de l'UDP.",rule:"MQTT → TCP (ports 1883/8883). CoAP → UDP. NE PAS confondre."},
{cat:"Confusion fréquente",sev:3,ch:"Protocoles",wrong:"MQTT QoS 0 garantit la livraison au moins une fois",right:"QoS 0 = 'at most once' = fire-and-forget. AUCUNE garantie. Le message peut être perdu.",why:"QoS 1 = at least once (peut dupliquer). QoS 2 = exactly once (garanti). QoS 0 est le niveau MINIMUM sans garantie.",rule:"QoS 0 = peut perdre. QoS 1 = au moins une fois. QoS 2 = exactement une fois."},
{cat:"Erreur classique",sev:2,ch:"Protocoles",wrong:"Le Broker MQTT est le publisher qui distribue les messages",right:"Le Broker MQTT est un SERVEUR INTERMÉDIAIRE qui reçoit des publishers et distribue aux subscribers. Il ne publie pas lui-même.",why:"Confusion sur les rôles : Publisher = produit, Subscriber = consomme, Broker = redistribue. Le découplage est l'avantage clé.",rule:"Publisher → Broker ← Subscriber. Le Broker est l'intermédiaire, pas l'émetteur."},

{cat:"Erreur classique",sev:2,ch:"Hardware",wrong:"La transmission radio est moins consommatrice que le traitement CPU dans l'IoT",right:"La TRANSMISSION RADIO est la principale source de consommation dans l'IoT. Le CPU consomme bien moins.",why:"Les modules radio transmettent à ~40-50 mA, en veille <10 µA. D'où l'importance du deep sleep et du duty cycle.",rule:"Consommation IoT : Tx Radio (40-50 mA) >> CPU >> Capteurs. Deep sleep = <10 µA."},
{cat:"Confusion fréquente",sev:2,ch:"Reseaux",wrong:"La 5G remplace complètement NB-IoT et LoRaWAN pour l'IoT",right:"Non : NB-IoT et LoRaWAN restent pertinents pour l'IoT LPWAN (batterie longue durée, faible coût). La 5G cible l'IoT massif/critique (mMTC, URLLC) mais est plus coûteuse.",why:"Chaque technologie a son créneau. LoRaWAN/NB-IoT = capteurs batterie longue durée. 5G = IoT critique + haute densité.",rule:"5G complète (pas remplace) LoRaWAN/NB-IoT. Choix selon portée, conso, coût."},
{cat:"Erreur classique",sev:3,ch:"Reseaux",wrong:"Le MSC en 2G gère les antennes radio directement",right:"Le MSC est le commutateur CENTRAL (logique). C'est la BTS qui est l'antenne, et le BSC qui contrôle les BTS.",why:"Hiérarchie 2G : BTS (antenne) → BSC (contrôle BTS) → MSC (commutation appels, mobilité).",rule:"BTS = antenne. BSC = contrôle BTS. MSC = commutateur central 2G."},
{cat:"Confusion fréquente",sev:2,ch:"Archi",wrong:"Edge Computing et Cloud Computing sont la même chose",right:"Edge = traitement LOCAL près du capteur (faible latence, offline possible). Cloud = traitement CENTRALISÉ à distance (puissance, historique, IA).",why:"Le Edge computing réduit la latence et la bande passante nécessaire en traitant localement.",rule:"Edge = local, rapide, confidentiel. Cloud = centralisé, puissant, dépendant du réseau."},
{cat:"Exception importante",sev:3,ch:"Reseaux",wrong:"LoRaWAN supporte bien la communication en temps réel strict",right:"LoRaWAN N'est PAS adapté au temps réel strict : duty cycle 1%, débit faible (kbps), latence de secondes.",why:"Les contraintes réglementaires et le faible débit rendent LoRaWAN inadapté pour la commande temps-réel.",rule:"LoRaWAN = données périodiques + petits messages. Temps réel → 4G/5G/WiFi."},
{cat:"Erreur classique",sev:2,ch:"Protocoles",wrong:"Une plateforme IoT propriétaire est toujours supérieure à une open source",right:"Les plateformes open source (ThingsBoard, Node-RED) sont souvent plus flexibles et gratuites. Les propriétaires offrent support et SLA mais sont payantes.",why:"Le choix dépend des besoins : budget, support, personnalisation, données sensibles.",rule:"Open source = flexible, gratuit, auto-hébergé. Propriétaire = support, SLA, coût."},
{cat:"Cas limite",sev:2,ch:"Reseaux",wrong:"Sigfox permet une communication bidirectionnelle équivalente à LoRaWAN",right:"Sigfox est très limité en downlink : seulement 4 messages DOWNLINK par jour max (vs uplink 140/jour). La bidirectionnalité est quasi-nulle.",why:"La modulation UNB de Sigfox est optimisée pour l'uplink massif. Le downlink est une fonctionnalité secondaire très limitée.",rule:"Sigfox downlink : 4 msg/jour max. LoRaWAN : bidirectionnel (limité par duty cycle mais bien meilleur)."},
{cat:"Erreur de cas pratique",sev:3,ch:"Archi",wrong:"Choisir le WiFi pour des capteurs agricoles en plein champ car 'tout le monde a le WiFi'",right:"WiFi = portée ~100-200m et forte consommation. Pour un champ de plusieurs km², il faudrait des dizaines de routeurs. LoRaWAN couvre le même champ avec 1-2 Gateways.",why:"Le piège : confondre disponibilité domestique du WiFi avec adaptabilité IoT terrain. Le bon critère est portée + autonomie batterie, pas la familiarité.",rule:"Toujours raisonner en termes de portée, consommation, débit nécessaire. Pas de 'choix évident'."},

const ST={
  qcm:{idx:0,answers:{},bookmarks:{},mode:'all',chapter:'all',timer:null,sec:0,running:false,shuffled:[]},
  fc:{idx:0,states:{},chapter:'all',shuffled:[]},
  ex:{completed:{}},
  search:'',
  streak:0,
  lastActive:'',
  load(){try{const s=localStorage.getItem('iot_state');if(s){const d=JSON.parse(s);this.qcm.answers=d.qa||{};this.qcm.bookmarks=d.bk||{};this.fc.states=d.fs||{};this.ex.completed=d.ec||{};this.streak=d.str||0;this.lastActive=d.la||'';}}catch(e){}},
  save(){try{localStorage.setItem('iot_state',JSON.stringify({qa:this.qcm.answers,bk:this.qcm.bookmarks,fs:this.fc.states,ec:this.ex.completed,str:this.streak,la:this.lastActive}))}catch(e){}}
};
ST.load();

function updateStreak(){
  const today=new Date().toLocaleDateString('en-CA');
  if(!ST.lastActive){
    ST.streak=1;ST.lastActive=today;ST.save();
  }else if(ST.lastActive!==today){
    const last=new Date(ST.lastActive);
    const now=new Date(today);
    const diffDays=Math.floor((now-last)/(1000*60*60*24));
    if(diffDays===1){ST.streak++;}else if(diffDays>1){ST.streak=1;}
    ST.lastActive=today;ST.save();
  }
  document.getElementById('streak-val').textContent=ST.streak;
}

  document.querySelectorAll('.tab-btn').forEach(b=>{

      if(window.innerWidth<=850 && document.querySelector('.nav-tabs').classList.contains('open')) toggleSidebar();
      document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(x=>x.classList.remove('active'));

      document.getElementById('tab-'+b.dataset.tab).classList.add('active');
      if(b.dataset.tab==='qcm') renderQCM();
      if(b.dataset.tab==='flashcards') renderFC();
      if(b.dataset.tab==='cheatsheet') renderCS();
      if(b.dataset.tab==='traps') renderTraps();
    });
  });
}
