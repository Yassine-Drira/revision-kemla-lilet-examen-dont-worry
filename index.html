  const s=document.documentElement;
  const p=(s.scrollTop/(s.scrollHeight-s.clientHeight))*100;
  document.getElementById('scroll-prog').style.width=p+'%';
});

/* === HELPERS === */
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function chTag(ch){
  const m={Intro:'tag-rmi',Hardware:'tag-rest',Reseaux:'tag-kafka',Protocoles:'tag-rpc',Archi:'tag-adv'};
  return `<span class="tag ${m[ch]||'tag-rmi'}">${esc(ch)}</span>`;
}
function diffTag(d){const m={easy:'tag-easy',med:'tag-med',hard:'tag-hard'};const l={easy:'Facile',med:'Moyen',hard:'Difficile'};return `<span class="tag ${m[d]}">${l[d]}</span>`;}
function hlSearch(txt){if(!ST.search||!txt)return esc(txt);const re=new RegExp('('+ST.search.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');return esc(txt).replace(re,'<span class="hl">$1</span>');}
function openModal(title,html){document.getElementById('modal-title').textContent=title;document.getElementById('modal-body').innerHTML=html;document.getElementById('modal-ov').classList.add('open');}
function closeModal(){document.getElementById('modal-ov').classList.remove('open');}
document.getElementById('modal-ov').addEventListener('click',e=>{if(e.target===document.getElementById('modal-ov'))closeModal();});
let _tstTO;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(_tstTO);_tstTO=setTimeout(()=>el.classList.remove('show'),2500);
}

/* === QCM ENGINE === */
function getFilteredQ(){
  let pool=Q;
  if(ST.qcm.chapter!=='all') pool=pool.filter(q=>q.ch===ST.qcm.chapter);
  if(ST.qcm.mode==='wrong') pool=pool.filter(q=>ST.qcm.answers[q.id]===false);
  if(ST.qcm.mode==='bookmarks') pool=pool.filter(q=>ST.qcm.bookmarks[q.id]);
  if(ST.search){
    const s=ST.search.toLowerCase();
    pool=pool.filter(q=>q.q.toLowerCase().includes(s) || q.expl.toLowerCase().includes(s) || q.opts.some(o=>o.toLowerCase().includes(s)));
  }
  return pool;
}
function renderQCM(){
  const el=document.getElementById('tab-qcm');
  const total=Q.length;
  const answeredIds=Object.keys(ST.qcm.answers).filter(k=>!k.endsWith('_sel'));
  const answered=answeredIds.length;
  const correct=answeredIds.filter(k=>ST.qcm.answers[k]===true).length;
  const wrong=answeredIds.filter(k=>ST.qcm.answers[k]===false).length;
  const chapters=['all','Intro','Hardware','Reseaux','Protocoles','Archi'];
  let pool=ST.qcm.shuffled.length?ST.qcm.shuffled:Q;
  if(!ST.qcm.shuffled.length){ST.qcm.shuffled=shuffle(Q);pool=ST.qcm.shuffled;}
  const fp=getFilteredQ();
  if(fp.length===0){
    let icon='🔍', title='Aucun résultat', sub='Essayez un autre terme de recherche.';
    if(ST.qcm.mode==='wrong'&&!ST.search){icon='🎉';title='Aucune erreur !';sub='Vous avez répondu correctement à toutes les questions tentées.<br>Continuez ainsi !'}
    else if(ST.qcm.mode==='bookmarks'&&!ST.search){icon='🔖';title='Aucun signet';sub='Cliquez sur <b>🔖 Sauvegarder</b> sur une question pour la retrouver ici.'}
    else if(ST.search){sub=`Aucune question ne correspond à <b>&laquo;${esc(ST.search)}&raquo;</b>.`}
    el.innerHTML=`<div class="empty"><span class="empty-icon">${icon}</span><div class="empty-title">${title}</div><div class="empty-sub">${sub}</div></div>`;
    return;
  }
  const qi=Math.min(ST.qcm.idx,fp.length-1);
  const q=fp[qi];
  const isAns=ST.qcm.answers.hasOwnProperty(q.id) && !String(q.id).endsWith('_sel');
  const isBk=ST.qcm.bookmarks[q.id];
  let navHtml=fp.map((qq,i)=>{
    let cls='qn-btn';
    if(i===qi)cls+=' cur';
    else if(ST.qcm.answers[qq.id]===true)cls+=' ans';
    else if(ST.qcm.answers[qq.id]===false)cls+=' bad';
    if(ST.qcm.bookmarks[qq.id])cls+=' bk';
    return `<button class="${cls}" onclick="gotoQ(${i})">${i+1}</button>`;
  }).join('');
  let optsHtml=q.opts.map((o,i)=>{
    let cls='opt-btn';
    let badge='';
    const selIdx=Number(ST.qcm.answers[String(q.id)+'_sel']);
    if(isAns){
      if(i===q.ans){cls+=' correct';badge='<span class="opt-badge ok">✓ Correcte</span>';}
      else if(ST.qcm.answers[q.id]===false && i===selIdx){cls+=' wrong';badge='<span class="opt-badge bad">✗ Votre réponse</span>';}
    }
    return `<button class="${cls}" ${isAns?'disabled':''} onclick="answerQ(${q.id},${i},${q.ans})">${String.fromCharCode(65+i)}. ${hlSearch(o)}${badge}</button>`;
  }).join('');
  el.innerHTML=`
<div class="dash">
  <div class="stat"><div class="v">${total}</div><div class="l">Questions total</div></div>
  <div class="stat"><div class="v" style="color:var(--ok)">${correct}</div><div class="l">Correctes</div></div>
  <div class="stat"><div class="v" style="color:var(--err)">${wrong}</div><div class="l">Erreurs</div></div>
  <div class="stat"><div class="v" style="color:var(--warn)">${total-answered}</div><div class="l">Restantes</div></div>
  <div class="stat"><div class="v">${answered?Math.round(correct/answered*100):0}%</div><div class="l">Score</div><div class="prog-wrap"><div class="prog-bar" style="width:${answered?Math.round(correct/answered*100):0}%"></div></div></div>
</div>
<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px">
  ${chapters.map(c=>`<button class="f-btn${ST.qcm.chapter===c?' on':''}" onclick="setQCh('${c}')">${c==='all'?'Tous':c}</button>`).join('')}
  <button class="f-btn${ST.qcm.mode==='wrong'?' on':''}" onclick="setQMode('wrong')" style="margin-left:8px">❌ Erreurs</button>
  <button class="f-btn${ST.qcm.mode==='bookmarks'?' on':''}" onclick="setQMode('bookmarks')">🔖 Favoris</button>
  <button class="f-btn${ST.qcm.mode==='all'?' on':''}" onclick="setQMode('all')">Toutes</button>
  <button class="btn btn-s" onclick="shuffleQ()" style="margin-left:auto">🔀 Mélanger</button>
  <button class="btn btn-warn" onclick="resetQCM()">↺ Réinitialiser</button>
</div>
<div class="q-nav">${navHtml}</div>
<div class="card">
  <div class="question-meta" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px">
    <span style="font-size:12px;color:var(--txt2)">Q ${qi+1}/${fp.length}</span>
    ${chTag(q.ch)} ${diffTag(q.diff)}
    <button class="btn btn-s" style="margin-left:auto;padding:4px 10px;font-size:12px" onclick="toggleBk(${q.id})">${isBk?'🔖 Sauvegardé':'🔖 Sauvegarder'}</button>
  </div>
  <div style="font-size:16px;font-weight:600;margin-bottom:16px;line-height:1.6">${hlSearch(q.q)}</div>
  <div>${optsHtml}</div>
  <div class="expl${isAns?' show':''}" id="expl-${q.id}">💡 ${hlSearch(q.expl)}</div>
  ${q.trap?`<div class="trap-note${isAns?' show':''}" id="trap-${q.id}">⚠️ ${hlSearch(q.trap)}</div>`:''}
</div>
<div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap">
  <button class="btn btn-s" onclick="prevQ()" ${qi===0?'disabled':''}>← Précédent</button>
  <button class="btn btn-s" onclick="skipQ()">⟩ Passer</button>
  <button class="btn btn-p" onclick="nextQ()" ${qi===fp.length-1?'disabled':''}>Suivant →</button>
  ${answered>0?`<button class="btn btn-ok" onclick="showResults()">📊 Résultats</button>`:''}
</div>`;
}
function answerQ(id,sel,ans){ST.qcm.answers[id]=(sel===ans);ST.qcm.answers[id+'_sel']=sel;ST.save();updateStreak();renderQCM();}
function nextQ(){const fp=getFilteredQ();if(ST.qcm.idx<fp.length-1){ST.qcm.idx++;renderQCM();}}
function prevQ(){if(ST.qcm.idx>0){ST.qcm.idx--;renderQCM();}}
function skipQ(){nextQ();}
function gotoQ(i){ST.qcm.idx=i;renderQCM();}
function setQCh(ch){ST.qcm.chapter=ch;ST.qcm.idx=0;renderQCM();}
function setQMode(m){ST.qcm.mode=m;ST.qcm.idx=0;renderQCM();}
function shuffleQ(){ST.qcm.shuffled=shuffle(Q);ST.qcm.idx=0;renderQCM();}
function toggleBk(id){ST.qcm.bookmarks[id]=!ST.qcm.bookmarks[id];ST.save();renderQCM();}
function resetQCM(){if(confirm('Réinitialiser toutes les réponses QCM ?')){ST.qcm.answers={};ST.qcm.bookmarks={};ST.save();renderQCM();}}
function showResults(){
  const total=Q.length,correct=Object.values(ST.qcm.answers).filter(v=>v===true).length;
  const wrong=Q.filter(q=>ST.qcm.answers[q.id]===false);
  const byChapter={};Q.forEach(q=>{if(!byChapter[q.ch])byChapter[q.ch]={c:0,t:0};byChapter[q.ch].t++;if(ST.qcm.answers[q.id]===true)byChapter[q.ch].c++;});
  const chRows=Object.entries(byChapter).map(([ch,v])=>`<tr><td>${ch}</td><td style="color:var(--ok)">${v.c}/${v.t}</td><td><div class="prog-wrap"><div class="prog-bar" style="width:${Math.round(v.c/v.t*100)}%"></div></div></td></tr>`).join('');
  const wrongList=wrong.map(q=>`<div style="padding:8px 0;border-bottom:1px solid var(--border)"><b>${esc(q.q)}</b><br><span style="color:var(--ok);font-size:12px">✅ ${esc(q.opts[q.ans])}</span><br><span style="font-size:12px;color:var(--txt2)">${esc(q.expl)}</span></div>`).join('');
  const pct=Math.round(correct/total*100);
  const cls=pct>=75?'good':pct>=50?'mid':'bad';
  openModal('📊 Résultats QCM',`<div class="r-grid"><div class="r-card"><div class="big ${cls}">${pct}%</div><div>Score global</div></div><div class="r-card"><div class="big good">${correct}</div><div>Correctes</div></div><div class="r-card"><div class="big bad">${wrong.length}</div><div>Erreurs</div></div></div><h3 style="margin:14px 0 8px">Par chapitre</h3><table style="width:100%;border-collapse:collapse;font-size:13px"><tr style="color:var(--txt2)"><th style="text-align:left">Chapitre</th><th>Score</th><th style="width:120px">Barre</th></tr>${chRows}</table><h3 style="margin:14px 0 8px">Questions ratées</h3>${wrongList||'<p style="color:var(--ok)">Bravo ! Aucune erreur.</p>'}<div style="margin-top:14px"><button class="btn btn-warn" onclick="closeModal();setQMode('wrong');renderQCM()">Revoir les erreurs</button></div>`);
}

function renderFC(){
  const el=document.getElementById('tab-flashcards');

  if(ST.search){
    const s=ST.search.toLowerCase();
    pool=pool.filter(f=>f.front.toLowerCase().includes(s)||f.back.toLowerCase().includes(s)||f.code.toLowerCase().includes(s));
  }
  if(!ST.fc.shuffled.length||ST.fc.shuffled[0]&&!pool.find(f=>f.id===ST.fc.shuffled[0].id))ST.fc.shuffled=shuffle(pool);
  let finalPool=ST.search?pool:ST.fc.shuffled.filter(f=>ST.fc.chapter==='all'||f.ch===ST.fc.chapter);

    finalPool=[...finalPool].sort((a,b)=>{

  const stateColor={rev:'var(--err)',med:'var(--warn)',ok:'var(--ok)',none:'var(--txt2)'}[st];
  const stateBorder={rev:'var(--err)',med:'var(--warn)',ok:'var(--ok)',none:'var(--border)'}[st];
  const revCount=finalPool.filter(f=>ST.fc.states[f.id]==='rev').length;
  const srHint=revCount>0?`⚠️ ${revCount} carte${revCount>1?'s':''} à revoir en tête de file`:'✅ Aucune carte à revoir';

  ${chapters.map(c=>`<button class="f-btn${ST.fc.chapter===c?' on':''}" onclick="setFCh('${c}')">${c==='all'?'Tous':c}</button>`).join('')}
  <button class="btn btn-s" onclick="shuffleFC()" style="margin-left:auto">🔀 Mélanger</button>

  🧠 Répétition espacée active &mdash; ${srHint}
</div>
<div class="dash" style="margin-bottom:16px">
  <div class="stat"><div class="v">${pool.length}</div><div class="l">Total</div></div>
  <div class="stat"><div class="v" style="color:var(--ok)">${mastered}</div><div class="l">Maîtrisées</div></div>
  <div class="stat"><div class="v" style="color:var(--warn)">${Object.values(ST.fc.states).filter(v=>v==='med').length}</div><div class="l">Moyennes</div></div>
  <div class="stat"><div class="v" style="color:var(--err)">${Object.values(ST.fc.states).filter(v=>v==='rev').length}</div><div class="l">À revoir</div></div>
</div>
<div style="text-align:center;color:var(--txt2);font-size:13px;margin-bottom:8px">${i+1} / ${finalPool.length} — Cliquer pour retourner</div>
<div class="fc-arena">

<div class="fc-status">

}
function flipFC(){document.getElementById('fc-card').classList.toggle('flipped');}
function nextFC(){const pool=FC.filter(f=>ST.fc.chapter==='all'||f.ch===ST.fc.chapter);if(ST.fc.idx<pool.length-1){ST.fc.idx++;renderFC();}}
function prevFC(){if(ST.fc.idx>0){ST.fc.idx--;renderFC();}}
function setFCh(c){ST.fc.chapter=c;ST.fc.idx=0;ST.fc.shuffled=[];renderFC();}
function shuffleFC(){ST.fc.shuffled=[];ST.fc.idx=0;renderFC();}
function setFCSt(id,s){ST.fc.states[id]=s;ST.save();updateStreak();renderFC();}

/* === CHEATSHEET ENGINE === */
function renderCS(){
  const el=document.getElementById('tab-cheatsheet');
  const keys=Object.keys(CS);
  if(!keys.length){
    el.innerHTML=`<div class="empty"><span class="empty-icon">📜</span><div class="empty-title">Aucun Cheat Sheet</div><div class="empty-sub">Les fiches de révision seront ajoutées bientôt.</div></div>`;
    return;
  }
  const idx=`<div class="jump-idx">${keys.map(k=>`<button class="j-link" onclick="document.getElementById('cs-${k}').scrollIntoView({behavior:'smooth'})">${CS[k].title}</button>`).join('')}</div>`;
  let html=idx+'<div class="cheat-grid">';
  keys.forEach(k=>{
    const c=CS[k];
    const s=ST.search?ST.search.toLowerCase():'';
    const items=c.items.filter(it=>!s||it.k.toLowerCase().includes(s)||it.v.toLowerCase().includes(s));
    if(ST.search && items.length===0 && !c.code.toLowerCase().includes(s)) return;
    html+=`<div class="cc" id="cs-${k}">
      <div class="cc-h"><h3>${esc(c.title)}</h3><button class="copy-btn" onclick="copyCS('${k}')">📋 Copier</button></div>
      <div class="cc-b">
        ${items.map(it=>`<div class="ci"><span class="ci-k">${hlSearch(it.k)}</span><span class="ci-v ac">${hlSearch(it.v)}</span></div>`).join('')}
        ${c.code && (!ST.search || c.code.toLowerCase().includes(s))?`<div class="cs">${esc(c.code)}</div>`:''}
      </div>
    </div>`;
  });
  html+='</div>';
  el.innerHTML=html;
}
function copyCS(k){const c=CS[k];const txt=c.items.map(i=>i.k+': '+i.v).join('\n')+(c.code?'\n\n'+c.code:'');navigator.clipboard.writeText(txt).then(()=>showToast('✓ Copié dans le presse-papiers'));}

/* === TRAPS ENGINE === */
function renderTraps(){
  const el=document.getElementById('tab-traps');
  if(!TRAPS.length){
    el.innerHTML=`<div class="empty"><span class="empty-icon">🪤</span><div class="empty-title">Aucun piège</div><div class="empty-sub">Les pièges d'examen seront ajoutés bientôt.</div></div>`;
    return;
  }
  const cats=['all','Confusion fréquente','Erreur classique','Exception importante','Cas limite'];
  const chapters=['all','Intro','Hardware','Reseaux','Protocoles','Archi'];
  const activeCat=window._trapCat||'all';
  const activeCh=window._trapCh||'all';
  let filtered=TRAPS.filter(t=>(activeCat==='all'||t.cat===activeCat)&&(activeCh==='all'||t.ch===activeCh));
  if(ST.search){
    const s=ST.search.toLowerCase();
    filtered=filtered.filter(t=>t.wrong.toLowerCase().includes(s)||t.right.toLowerCase().includes(s)||t.why.toLowerCase().includes(s)||t.rule.toLowerCase().includes(s));
  }
  const sevDots=n=>[...Array(3)].map((_,i)=>`<div class="s-dot" style="background:${i<n?'var(--err)':'var(--border)'}"></div>`).join('');
  let html=`<div class="filter-bar">${cats.map(c=>`<button class="f-btn${activeCat===c?' on':''}" onclick="window._trapCat='${c}';renderTraps()">${c==='all'?'Toutes':c}</button>`).join('')}</div>
  <div class="filter-bar">${chapters.map(c=>`<button class="f-btn${activeCh===c?' on':''}" onclick="window._trapCh='${c}';renderTraps()">${c==='all'?'Tous':c}</button>`).join('')}</div>`;
  filtered.forEach(t=>{
    const cls=t.cat==='Confusion fréquente'?'w':t.cat==='Exception importante'?'i':'';
    html+=`<div class="trap-card ${cls}">
      <div class="tc-head">
        <div><span class="tc-cat" style="color:${cls==='w'?'var(--warn)':cls==='i'?'var(--accent)':'var(--err)'}">${esc(t.cat)}</span> ${chTag(t.ch)}</div>
        <div class="severity">${sevDots(t.sev)}</div>
      </div>
      <div class="tw"><div class="lbl">❌ Erreur fréquente</div><div>${hlSearch(t.wrong)}</div></div>
      <div class="tc" style="margin-top:8px"><div class="lbl">✅ Réalité</div><div>${hlSearch(t.right)}</div></div>
      <div style="font-size:12px;color:var(--txt2);margin-top:6px">💬 ${hlSearch(t.why)}</div>
      <div class="tc-rule">📌 ${hlSearch(t.rule)}</div>
    </div>`;
  });
  if(filtered.length===0){
    const sub=ST.search?`Aucun piège ne correspond à <b>&laquo;${esc(ST.search)}&raquo;</b>.`:'Aucun piège pour cette combinaison de filtres.';
    html+=`<div class="empty"><span class="empty-icon">🪤</span><div class="empty-title">Aucun piège trouvé</div><div class="empty-sub">${sub}</div></div>`;
  }
  el.innerHTML=html;
}

/* === SEARCH === */
function triggerActiveTabRender(){
  const active=document.querySelector('.tab-btn.active');
  if(!active) return;
  const tab=active.dataset.tab;
  if(tab==='qcm') renderQCM();
  else if(tab==='flashcards') renderFC();
  else if(tab==='cheatsheet') renderCS();
  else if(tab==='traps') renderTraps();
}
document.getElementById('search-box').addEventListener('input',e=>{
  ST.search=e.target.value.trim();
  triggerActiveTabRender();
});

/* === KEYBOARD SHORTCUTS === */
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if(e.key==='Escape'){closeModal();return;}
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();document.getElementById('search-box').focus();return;}
  const tab=document.querySelector('.tab-btn.active')?.dataset.tab;
  if(tab==='qcm'){
    if(e.key==='ArrowLeft'){e.preventDefault();prevQ();return;}
    if(e.key==='ArrowRight'){e.preventDefault();nextQ();return;}
    if(e.key==='b'||e.key==='B'){
      const fp=getFilteredQ();
      const q=fp[Math.min(ST.qcm.idx,fp.length-1)];
      if(q) toggleBk(q.id);
      return;
    }
    if(['1','2','3','4'].includes(e.key)){
      const fp=getFilteredQ();
      const q=fp[Math.min(ST.qcm.idx,fp.length-1)];
      const idx=parseInt(e.key)-1;
      if(q && !ST.qcm.answers.hasOwnProperty(q.id) && idx<q.opts.length){
        answerQ(q.id,idx,q.ans);
      }
      return;
    }
  }
  if(tab==='flashcards'){
    if(e.key===' '){e.preventDefault();flipFC();return;}
    if(e.key==='ArrowLeft'){e.preventDefault();prevFC();return;}
    if(e.key==='ArrowRight'){e.preventDefault();nextFC();return;}
    if(['1','2','3'].includes(e.key)){
      const pool=FC.filter(f=>ST.fc.chapter==='all'||f.ch===ST.fc.chapter);
      const f=pool[Math.min(ST.fc.idx,pool.length-1)];
      if(f){
        const rating=['rev','med','ok'][parseInt(e.key)-1];
        setFCSt(f.id,rating);
      }
      return;
    }
  }
});

/* === SESSION TIMER === */
const _sessionStart=Date.now();
setInterval(()=>{
  const sec=Math.floor((Date.now()-_sessionStart)/1000);
  const mm=String(Math.floor(sec/60)).padStart(2,'0');
  const ss=String(sec%60).padStart(2,'0');
  const el=document.getElementById('session-clock');
  if(el){el.textContent=mm+':'+ss;if(sec>0)el.classList.add('active');}
},1000);
