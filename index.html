<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UI/UX — Plateforme de Révision</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --panel: #141821;
  --border: #232838;
  --primary: #3b82f6;
  --secondary: #60a5fa;
  --success: #22c55e;
  --warning: #f59e0b;
  --danger: #ef4444;
  --text: #f3f4f6;
  --muted: #9ca3af;
  --font: 'Sora', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.6;min-height:100vh}
#scroll-bar{position:fixed;top:0;left:0;height:2px;background:var(--primary);z-index:9999;transition:width .1s}
nav{position:sticky;top:0;z-index:100;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0;padding:0 16px;height:52px;overflow-x:auto}
nav .logo{font-weight:700;font-size:13px;color:var(--primary);white-space:nowrap;margin-right:24px;letter-spacing:.5px}
.tab-btn{background:none;border:none;color:var(--muted);font-family:var(--font);font-size:12.5px;font-weight:500;padding:0 14px;height:52px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .2s,border-color .2s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}
.search-wrap{margin-left:auto;position:relative}
.search-wrap input{background:#0d0f14;border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:12px;padding:6px 12px 6px 30px;border-radius:6px;width:200px;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--primary)}
.search-wrap::before{content:"⌕";position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px}
#search-results{position:absolute;top:36px;right:0;width:340px;background:var(--panel);border:1px solid var(--border);border-radius:8px;max-height:320px;overflow-y:auto;z-index:200;display:none}
.sr-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);font-size:12px}
.sr-item:hover{background:#1a2035}
.sr-item .sr-tag{font-size:10px;color:var(--primary);margin-bottom:2px}
.sr-item .sr-q{color:var(--text)}
.sr-item mark{background:#3b82f633;color:var(--secondary);border-radius:2px}

.tab{display:none;padding:24px 20px;max-width:1100px;margin:0 auto}
.tab.active{display:block}

/* DASHBOARD */
.dash{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:28px}
.dash-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center}
.dash-card .dval{font-size:28px;font-weight:700;color:var(--primary)}
.dash-card .dlbl{font-size:11px;color:var(--muted);margin-top:4px}
.progress-bar{background:var(--border);border-radius:4px;height:6px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:var(--primary);border-radius:4px;transition:width .5s}

/* QCM */
.quiz-controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.btn{background:var(--primary);color:#fff;border:none;border-radius:6px;padding:8px 16px;font-family:var(--font);font-size:12.5px;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn.outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn.outline:hover{border-color:var(--primary);color:var(--primary)}
.btn.danger{background:var(--danger)}
.btn.success{background:var(--success)}
.btn.warning{background:var(--warning);color:#000}
.btn.sm{padding:5px 10px;font-size:11.5px}

.qcard{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:24px;margin-bottom:16px}
.qcard .qmeta{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.tag{font-size:11px;font-weight:700;padding:3px 10px;border-radius:4px;letter-spacing:.4px}
.tag.ch{background:#1e2d4a;color:#93c5fd}
.tag.easy{background:#166534;color:#bbf7d0}
.tag.med{background:#92400e;color:#fde68a}
.tag.hard{background:#991b1b;color:#fecaca}
.qtxt{font-size:14px;font-weight:500;margin-bottom:16px;line-height:1.5}
.qoptions{display:flex;flex-direction:column;gap:8px}
.qopt{background:#0d0f14;border:1px solid var(--border);border-radius:6px;padding:10px 14px;cursor:pointer;transition:border-color .15s,background .15s;font-size:13px;text-align:left;color:var(--text);font-family:var(--font)}
.qopt:hover:not(.disabled){border-color:var(--primary);background:#141821}
.qopt.selected{border-color:var(--primary);background:#1a2a4a}
.qopt.correct{border-color:var(--success);background:#0f2a1a}
.qopt.wrong{border-color:var(--danger);background:#2a0f0f}
.qopt.disabled{cursor:default}
.explanation{margin-top:14px;padding:12px 14px;background:#0a1520;border-left:3px solid var(--primary);border-radius:0 6px 6px 0;font-size:12.5px;color:var(--muted);display:none}
.explanation.show{display:block}
.trap-note{margin-top:8px;padding:8px 12px;background:#1a0f0a;border-left:3px solid var(--warning);border-radius:0 6px 6px 0;font-size:12px;color:var(--warning)}
.qnav{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap}
.qnum{width:32px;height:32px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;transition:.15s}
.qnum.answered{background:#1a2a4a;border-color:var(--primary);color:var(--primary)}
.qnum.wrong-ans{background:#2a0f0f;border-color:var(--danger);color:var(--danger)}
.qnum.bookmarked{border-color:var(--warning)}
.qnum.current{border-color:var(--secondary);color:var(--secondary)}

.results-wrap{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:28px}
.score-big{font-size:64px;font-weight:700;color:var(--primary);text-align:center}
.score-label{text-align:center;color:var(--muted);font-size:13px;margin-bottom:24px}
.per-chapter{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:20px}
.ch-score{background:#0d0f14;border:1px solid var(--border);border-radius:8px;padding:12px 16px}
.ch-score .chn{font-size:12px;font-weight:600;margin-bottom:6px}
.ch-score .chv{font-size:20px;font-weight:700;color:var(--secondary)}

/* EXERCISES */
.excard{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:22px;margin-bottom:18px}
.excard h3{font-size:14px;font-weight:600;margin-bottom:10px}
.excard .context{font-size:12.5px;color:var(--muted);margin-bottom:12px;line-height:1.6}
.excard .task{padding:12px;background:#0a1520;border-left:3px solid var(--secondary);border-radius:0 6px 6px 0;font-size:13px;margin-bottom:14px}
.excard textarea{width:100%;background:#0d0f14;border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:12px;padding:12px;resize:vertical;min-height:80px;outline:none;transition:border-color .2s}
.excard textarea:focus{border-color:var(--primary)}
.solution{margin-top:14px;display:none}
.solution.show{display:block}
.solution-block{background:#060a0f;border:1px solid var(--border);border-radius:8px;padding:16px;font-size:12px;font-family:var(--mono);white-space:pre-wrap;line-height:1.7}
.hint-box{background:#1a1a0a;border:1px solid #3a3010;border-radius:6px;padding:10px 14px;font-size:12px;color:var(--warning);margin-top:10px;display:none}
.hint-box.show{display:block}
.piege{background:#1a0808;border:1px solid #3a1010;border-radius:6px;padding:10px 14px;font-size:12px;color:var(--danger);margin-top:10px}

/* FLASHCARDS */
.fc-controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:20px}
.fc-filter{background:var(--panel);border:1px solid var(--border);color:var(--text);font-family:var(--font);padding:6px 12px;border-radius:6px;font-size:12px;outline:none}
.fc-wrap{perspective:1000px;margin-bottom:20px}
.fc-inner{position:relative;width:100%;max-width:640px;margin:0 auto;height:260px;transform-style:preserve-3d;transition:transform .5s}
.fc-inner.flipped{transform:rotateY(180deg)}
.fc-front,.fc-back{position:absolute;inset:0;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:32px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;backface-visibility:hidden;cursor:pointer}
.fc-back{transform:rotateY(180deg);background:#0f1822}
.fc-front .flabel{font-size:10px;color:var(--primary);font-weight:600;margin-bottom:16px;letter-spacing:1px;text-transform:uppercase}
.fc-back .blabel{font-size:10px;color:var(--success);font-weight:600;margin-bottom:16px;letter-spacing:1px;text-transform:uppercase}
.fc-front .fq{font-size:15px;font-weight:600;line-height:1.5}
.fc-back .fa{font-size:13px;line-height:1.6;color:var(--muted)}
.fc-back .fa strong{color:var(--text)}
.fc-nav{display:flex;gap:12px;justify-content:center;margin-bottom:20px;align-items:center}
.fc-count{font-size:12px;color:var(--muted)}
.fc-states{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.state-btn{border:none;border-radius:6px;padding:7px 18px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:.2s}
.state-btn.review{background:#2e2010;color:var(--warning);border:1px solid #5a3a10}
.state-btn.medium{background:#1a1e30;color:var(--secondary);border:1px solid #2a3050}
.state-btn.mastered{background:#0f2a1a;color:var(--success);border:1px solid #1a5a30}
.fc-prog{display:flex;gap:16px;justify-content:center;margin-bottom:20px;font-size:12px}
.fc-prog span{color:var(--muted)}
.fc-prog strong{color:var(--text)}

/* CHEAT SHEET */
.cs-index{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.cs-index a{font-size:11.5px;color:var(--primary);text-decoration:none;background:#1a2a4a;padding:4px 10px;border-radius:4px;transition:.2s}
.cs-index a:hover{background:var(--primary);color:#fff}
.cs-section{margin-bottom:28px}
.cs-section h2{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);letter-spacing:.5px;text-transform:uppercase}
.cs-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px}
.cs-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px}
.cs-card h4{font-size:12px;font-weight:600;color:var(--secondary);margin-bottom:8px}
.cs-card p,.cs-card li{font-size:12px;color:var(--muted);line-height:1.6}
.cs-card ul{padding-left:16px}
.cs-card code{font-family:var(--mono);background:#0d0f14;color:var(--warning);padding:1px 5px;border-radius:3px;font-size:11px}
.copy-btn{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:10px;padding:2px 7px;border-radius:3px;cursor:pointer;float:right;margin-left:8px;transition:.2s}
.copy-btn:hover{border-color:var(--primary);color:var(--primary)}
.collapsible-hdr{cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none}
.collapsible-hdr .arrow{transition:transform .2s;font-size:10px}
.collapsible-hdr.open .arrow{transform:rotate(180deg)}
.collapsible-body{overflow:hidden;transition:max-height .3s;max-height:0}
.collapsible-body.open{max-height:2000px}

/* TRAPS */
.trap-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:14px}
.trap-card .trap-hdr{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.sev{font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:.5px}
.sev.high{background:#2e0f0f;color:var(--danger)}
.sev.med{background:#2e2010;color:var(--warning)}
.sev.low{background:#0f1e30;color:var(--secondary)}
.trap-card .wrong{color:var(--danger);font-size:12.5px;margin-bottom:6px}
.trap-card .wrong::before{content:"✗  "}
.trap-card .correct-t{color:var(--success);font-size:12.5px;margin-bottom:6px}
.trap-card .correct-t::before{content:"✓  "}
.trap-card .why{font-size:12px;color:var(--muted);margin-top:8px;padding:8px 12px;background:#0d0f14;border-radius:6px}
.trap-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.tf-btn{font-size:11.5px;padding:5px 12px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:.2s}
.tf-btn.active{border-color:var(--primary);color:var(--primary)}

table{width:100%;border-collapse:collapse;font-size:12px;margin:10px 0}
th{background:#141821;color:var(--secondary);padding:8px 10px;text-align:left;border:1px solid var(--border);font-weight:600}
td{padding:8px 10px;border:1px solid var(--border);color:var(--muted)}

.mode-select{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.mode-btn{background:#0d0f14;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:8px 14px;font-size:12px;cursor:pointer;transition:.2s;font-family:var(--font)}
.mode-btn.active{border-color:var(--primary);color:var(--primary);background:#1a2a4a}

.timer-display{font-family:var(--mono);font-size:20px;font-weight:600;color:var(--warning);margin-bottom:12px}

.export-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;padding:14px;background:var(--panel);border:1px solid var(--border);border-radius:8px}

@media print{
  nav,.tab-btn,.quiz-controls,.qnav,.fc-controls,.export-bar,.mode-select,.trap-filter{display:none!important}
  .tab{display:block!important;padding:0}
  body{background:#fff;color:#000}
  .cs-card{border:1px solid #ccc;break-inside:avoid}
  .cs-card code{background:#f0f0f0;color:#333}
}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#3a4060}
</style>
</head>
<body>
<div id="scroll-bar"></div>
<nav>
  <div class="logo">UI/UX ⬡ REV</div>
  <button class="tab-btn active" onclick="switchTab('qcm',this)">QCM</button>
  <button class="tab-btn" onclick="switchTab('exercises',this)">Exercices Code</button>
  <button class="tab-btn" onclick="switchTab('flashcards',this)">Flashcards</button>
  <button class="tab-btn" onclick="switchTab('cheatsheet',this)">Cheat Sheet</button>
  <button class="tab-btn" onclick="switchTab('traps',this)">Pièges d'exam</button>
  <div class="search-wrap">
    <input type="text" id="global-search" placeholder="Rechercher..." oninput="globalSearch(this.value)">
    <div id="search-results"></div>
  </div>
</nav>

<!-- ===== QCM TAB ===== -->
<div class="tab active" id="tab-qcm">
  <div class="dash" id="dashboard"></div>
  <div class="export-bar">
    <button class="btn sm outline" onclick="exportWrong()">⬇ Exporter erreurs</button>
    <button class="btn sm outline" onclick="retryWrong()">↺ Réessayer erreurs</button>
    <button class="btn sm outline" onclick="resetQuiz()">✕ Réinitialiser</button>
  </div>
  <div class="mode-select">
    <button class="mode-btn active" onclick="setMode('all',this)">Tout</button>
    <button class="mode-btn" onclick="setMode('weak',this)">Sujets faibles</button>
    <button class="mode-btn" onclick="setMode('timed',this)">Mode chronométré</button>
    <button class="mode-btn" onclick="setMode('random',this)">Aléatoire</button>
  </div>
  <div id="qcm-inner"></div>
</div>

<!-- ===== EXERCISES TAB ===== -->
<div class="tab" id="tab-exercises">
  <div class="export-bar">
    <button class="btn sm outline" onclick="markAllEx()">✓ Tout compléter</button>
    <button class="btn sm outline" onclick="resetEx()">↺ Réinitialiser</button>
  </div>
  <div id="exercises-inner"></div>
</div>

<!-- ===== FLASHCARDS TAB ===== -->
<div class="tab" id="tab-flashcards">
  <div class="fc-controls">
    <button class="btn sm" onclick="shuffleFC()">⇌ Mélanger</button>
    <button class="btn sm outline" onclick="setFCMode('all')">Toutes</button>
    <button class="btn sm outline" onclick="setFCMode('review')">À revoir</button>
    <button class="btn sm outline" onclick="setFCMode('mastered')">Maîtrisées</button>
    <select class="fc-filter" id="fc-chapter-filter" onchange="filterFCChapter(this.value)">
      <option value="all">Tous chapitres</option>
    </select>
    <button class="btn sm outline" onclick="exportFC()">⬇ Exporter à revoir</button>
  </div>
  <div class="fc-prog" id="fc-progress"></div>
  <div class="fc-wrap"><div class="fc-inner" id="fc-card" onclick="flipCard()">
    <div class="fc-front"><div class="flabel">QUESTION</div><div class="fq" id="fc-front-txt"></div><div style="font-size:10px;color:var(--muted);margin-top:16px">Cliquer pour révéler</div></div>
    <div class="fc-back"><div class="blabel">RÉPONSE</div><div class="fa" id="fc-back-txt"></div></div>
  </div></div>
  <div class="fc-nav">
    <button class="btn sm outline" onclick="prevFC()">← Préc</button>
    <span class="fc-count" id="fc-count">1/30</span>
    <button class="btn sm outline" onclick="nextFC()">Suiv →</button>
  </div>
  <div class="fc-states">
    <button class="state-btn review" onclick="setFCState('review')">🔁 À revoir</button>
    <button class="state-btn medium" onclick="setFCState('medium')">〜 Moyen</button>
    <button class="state-btn mastered" onclick="setFCState('mastered')">✓ Maîtrisé</button>
  </div>
</div>

<!-- ===== CHEAT SHEET TAB ===== -->
<div class="tab" id="tab-cheatsheet">
  <div class="export-bar">
    <button class="btn sm outline" onclick="window.print()">🖨 Imprimer</button>
  </div>
  <div class="cs-index" id="cs-index"></div>
  <div id="cheatsheet-inner"></div>
</div>

<!-- ===== TRAPS TAB ===== -->
<div class="tab" id="tab-traps">
  <div class="trap-filter">
    <button class="tf-btn active" onclick="filterTrap('all',this)">Tous</button>
    <button class="tf-btn" onclick="filterTrap('confusion',this)">Confusion fréquente</button>
    <button class="tf-btn" onclick="filterTrap('erreur',this)">Erreur classique</button>
    <button class="tf-btn" onclick="filterTrap('exception',this)">Exception importante</button>
    <button class="tf-btn" onclick="filterTrap('limite',this)">Cas limite</button>
  </div>
  <div id="traps-inner"></div>
</div>

<script>
// ============================================================
// DATA
// ============================================================

const CHAPTERS = {
  p1: "Partie 1 – Intro UI/UX",
  p2: "Partie 2 – Ergonomie & Lois",
  p3: "Partie 3 – Bases de Projet",
  p4: "Partie 4 – Design Thinking"
};

const QUESTIONS = [
  // PARTIE 1
  {id:1,chapter:"p1",diff:"easy",q:"Quelle est la différence entre UI et UX ?",opts:["UI = expérience globale, UX = interface visuelle","UI = interface visuelle et interactions directes, UX = expérience globale du produit","UI = expérience client, UX = interface tactile","Ils sont synonymes"],ans:1,expl:"L'UI (User Interface) concerne la conception visuelle et les interactions directes. L'UX (User Experience) désigne l'expérience globale du produit.",trap:null},
  {id:2,chapter:"p1",diff:"easy",q:"Que signifie CX ?",opts:["Customer Experience","Computer Exchange","Content Exchange","Customer Experience eXtended"],ans:0,expl:"CX = Customer Experience : l'expérience entre le client et l'entreprise, avant, pendant et après, au-delà du produit.",trap:null},
  {id:3,chapter:"p1",diff:"easy",q:"IHM signifie :",opts:["Interface Homme-Machine","Interaction Homme-Multimédia","Interface Hybride Multimodale","Interaction Hybride Machine"],ans:0,expl:"IHM = Interface Homme-Machine : matériels et logiciels permettant à l'utilisateur d'interagir avec un SI.",trap:"Ne pas confondre IHM (l'objet) avec l'Interaction Homme-Machine (la discipline)."},
  {id:4,chapter:"p1",diff:"med",q:"L'approche technocentrée signifie :",opts:["On se concentre sur l'humain et ses besoins","On se concentre sur la machine, l'utilisateur s'adapte","On adapte l'interface à l'environnement","On utilise des technologies de pointe"],ans:1,expl:"L'approche technocentrée met la machine au centre : capacités techniques d'abord, puis l'utilisateur doit s'adapter → logique système.",trap:"Opposé de l'approche anthropocentrée."},
  {id:5,chapter:"p1",diff:"med",q:"L'approche anthropocentrée suit la logique :",opts:["Système","Utilisateur","Machine","Technologie"],ans:1,expl:"L'approche anthropocentrée centre la conception sur l'homme et ses besoins → logique utilisateur. La machine s'adapte à l'humain.",trap:null},
  {id:6,chapter:"p1",diff:"easy",q:"Quelles sont les conséquences d'une mauvaise IHM ? (plusieurs réponses possibles)",opts:["Baisse de productivité","Augmentation des ventes","Erreurs pouvant mener à des accidents","Ennui et frustration"],ans:[0,2,3],expl:"Une mauvaise IHM provoque : baisse de productivité, ennui/anxiété/frustration, rejet de l'interface, coût d'apprentissage élevé, erreurs → accidents mortels.",trap:null},
  {id:7,chapter:"p1",diff:"med",q:"WYSIWYG est lié à quel concept ?",opts:["Ce que vous voyez est ce que vous obtenez (ACAI)","Web Yet Simple Interface Getting","What You See Is What You Give","Widget Yet Simple Interface Grid"],ans:0,expl:"WYSIWYG = 'What You See Is What You Get' = ACAI (ce que vous voyez est ce que vous obtenez). Concept d'interface GUI où l'affichage reflète le résultat final.",trap:null},
  {id:8,chapter:"p1",diff:"hard",q:"Parmi les thèmes humains influençant l'IHM, H3 correspond à :",opts:["Human information processing","Langage et communication","Ergonomie","Interaction Homme-Machine"],ans:2,expl:"H3 = Ergonomie : adaptation du système aux capacités physiques et physiologiques de l'humain (caractéristiques anthropométriques, limites perceptives/cognitives, fatigue).",trap:"H1 = traitement de l'information, H2 = langage et communication, H3 = ergonomie."},
  {id:9,chapter:"p1",diff:"med",q:"L'UX Design repose sur 3 piliers :",opts:["Humain, Technique, Marketing","Design, Code, Test","Utilisateur, Client, Entreprise","Fonctionnel, Visuel, Sonore"],ans:0,expl:"Les 3 piliers UX Design : Humain (attractif), Tech (réalisable), Marketing (durable).",trap:null},
  {id:10,chapter:"p1",diff:"med",q:"Combien de critères définissent l'UX Design ?",opts:["5","6","7","9"],ans:2,expl:"7 critères : Utile, Trouvable, Utilisable, Désirable, Navigable, Accessible, Crédible.",trap:null},
  {id:11,chapter:"p1",diff:"easy",q:"Le critère 'Trouvable' en UX Design est lié à :",opts:["L'accessibilité aux personnes handicapées","Le référencement dans les moteurs de recherche (SEO)","La navigation mobile","La qualité visuelle"],ans:1,expl:"Trouvable = SEO : trouver facilement le site dans les moteurs de recherche.",trap:null},
  {id:12,chapter:"p1",diff:"hard",q:"Quel composant technique (C) traite l'organisation interne du système ?",opts:["C1","C2","C3","C5"],ans:3,expl:"C5 = Dialogue Architecture : organisation interne du système. C1=devices, C2=dialogue technique, C3=concepts abstraits, C4=représentation graphique.",trap:null},
  {id:13,chapter:"p1",diff:"med",q:"Quel est le rôle principal de l'UI Designer ?",opts:["Étudier les émotions des internautes","Assurer le lien homme-machine et la clarté de navigation","Rendre le site accessible et crédible","Insérer des scénarios utilisateur"],ans:1,expl:"L'UI Designer assure le lien homme-machine, conçoit l'interface, clarifie la navigation et optimise les parcours.",trap:"L'UX Designer est celui qui insère des scénarios et étudie les émotions."},
  {id:14,chapter:"p1",diff:"easy",q:"La réalité augmentée combine :",opts:["Uniquement le virtuel","Réel + virtuel","Réel uniquement","Virtuel + suppression d'éléments"],ans:1,expl:"La réalité augmentée = réel + virtuel. La réalité diminuée = suppression d'éléments. La réalité virtuelle = simulation.",trap:"Ne pas confondre réalité augmentée (ajout) et réalité diminuée (suppression)."},
  {id:15,chapter:"p1",diff:"hard",q:"Quel thème Usage concerne l'adaptation de l'utilisateur à l'interface ?",opts:["U1","U2","U3","U4"],ans:2,expl:"U3 = Human-Machine Adaptation : adapter l'utilisateur, adapter l'interface, ou les deux. U1 = organisation sociale, U2 = types d'applications.",trap:null},
  // PARTIE 2
  {id:16,chapter:"p2",diff:"easy",q:"La loi de Fitts modélise :",opts:["Le temps de mémorisation","Le temps pour atteindre une cible selon sa taille et distance","Le nombre d'options avant décision","La durée d'attention"],ans:1,expl:"Loi de Fitts : T = I.log₂(2D/L). Cible loin (D↑) → plus lent. Cible petite (L↓) → plus lent.",trap:null},
  {id:17,chapter:"p2",diff:"med",q:"Selon la loi de Hick, que se passe-t-il quand le nombre de choix augmente ?",opts:["Le temps de décision diminue","Le temps de décision augmente","L'utilisateur choisit mieux","Aucun effet"],ans:1,expl:"Loi de Hick : le temps nécessaire pour prendre une décision augmente avec le nombre et la complexité des choix.",trap:"Contre-intuitif : plus de choix = décision plus lente, pas meilleure."},
  {id:18,chapter:"p2",diff:"easy",q:"La MCT (Mémoire à Court Terme) peut stocker environ :",opts:["3±1 items","7±2 items","7±3 items","100 items"],ans:2,expl:"La MCT stocke 7±2 ou 7±3 items, avec un oubli de 15 à 30 secondes. Accès séquentiel.",trap:"7±2 est aussi cité (loi de Miller) – ici le cours dit 7±3. Savoir les deux."},
  {id:19,chapter:"p2",diff:"med",q:"La MLT (Mémoire à Long Terme) se caractérise par :",opts:["Capacité limitée, accès séquentiel","Capacité infinie, accès associatif, durée illimitée","7±3 items, 30 sec","Accès direct, capacité de 1000 items"],ans:1,expl:"MLT : capacité infinie, accès associatif, durée de stockage illimitée. Contrairement à la MCT.",trap:"MLT ≠ MCT. Ne pas inverser les propriétés."},
  {id:20,chapter:"p2",diff:"hard",q:"Le cycle du système moteur dure environ :",opts:["7 ms","70 ms","700 ms","7000 ms"],ans:1,expl:"Le système moteur contrôle les mouvements du corps avec des micro-mouvements discrets : cycle = 70 ms.",trap:null},
  {id:21,chapter:"p2",diff:"easy",q:"Le principe des 2 secondes stipule :",opts:["Une page doit se charger en 2 secondes max","La réponse système ne doit pas dépasser 2 secondes","Un utilisateur décide en 2 secondes","Un clic doit être traité en 2 secondes"],ans:1,expl:"Le principe des 2 secondes : la réponse système ne doit pas dépasser 2 sec. Sinon : l'utilisateur pense que ça ne fonctionne pas.",trap:null},
  {id:22,chapter:"p2",diff:"easy",q:"Combien de clics maximum pour accéder à une information selon le principe des 3 clics ?",opts:["2","3","5","7"],ans:1,expl:"Principe des 3 clics : toute information doit être accessible en 3 clics maximum, sinon l'utilisateur risque d'abandonner.",trap:null},
  {id:23,chapter:"p2",diff:"med",q:"La loi de Gestalt dit que le cerveau :",opts:["Perçoit des éléments isolés","Perçoit un ensemble organisé","Analyse chaque pixel séparément","Ne mémorise que les couleurs"],ans:1,expl:"Gestalt : le cerveau ne perçoit pas des éléments isolés, il perçoit un ensemble organisé (proximité, similarité, continuité, fermeture, symétrie, région).",trap:null},
  {id:24,chapter:"p2",diff:"hard",q:"L'interférence proactive en mémoire signifie :",opts:["Une nouvelle info bloque une ancienne","Une ancienne info bloque une nouvelle","Deux infos similaires se confondent","L'encodage est défectueux"],ans:1,expl:"Interférence proactive : une ancienne information bloque l'encodage d'une nouvelle. L'interférence rétroactive fait l'inverse.",trap:"Proactive = ancienne bloque nouvelle. Rétroactive = nouvelle bloque ancienne."},
  {id:25,chapter:"p2",diff:"med",q:"L'ergonomie logicielle vise à :",opts:["Rendre l'interface belle","Adapter les logiciels à l'utilisateur pour réduire erreurs et apprentissage","Optimiser le code","Concevoir des capteurs ergonomiques"],ans:1,expl:"L'ergonomie logicielle adapte les logiciels à l'utilisateur pour diminuer les erreurs, réduire le temps d'apprentissage.",trap:null},
  {id:26,chapter:"p2",diff:"med",q:"Quels sont les 2 critères de base de conception UI ergonomique ?",opts:["Utilité et Utilisabilité","Design et Performance","Vitesse et Accessibilité","Couleur et Typographie"],ans:0,expl:"a. Utilité : produit satisfait critères fonctionnels/opérationnels. b. Utilisabilité : facilité d'apprentissage et d'utilisation.",trap:null},
  {id:27,chapter:"p2",diff:"hard",q:"Les principes de Gestalt incluent (plusieurs réponses) :",opts:["Proximité","Similarité","Fermeture","Symétrie"],ans:[0,1,2,3],expl:"Gestalt inclut : Proximité, similarité, continuité, fermeture, symétrie, région. Toutes ces réponses font partie des lois de Gestalt.",trap:null},
  // PARTIE 3
  {id:28,chapter:"p3",diff:"easy",q:"Un Persona est :",opts:["Un utilisateur réel interviewé","Une représentation fictive basée sur des caractéristiques fréquentes d'utilisateurs réels","Un profil de concurrent","Un test utilisateur"],ans:1,expl:"Persona = représentation fictive basée sur des caractéristiques fréquentes observées chez plusieurs utilisateurs réels (ce n'est pas réel).",trap:"Un persona N'EST PAS un utilisateur réel."},
  {id:29,chapter:"p3",diff:"med",q:"La Journey Map répond à la question :",opts:["Pour qui tu développes ?","Comment il utilise ton produit ?","Par où il passe exactement dans l'application ?","Quels sont ses besoins ?"],ans:1,expl:"Journey Map = comment l'utilisateur vit l'expérience, visualisation du parcours à travers les étapes d'interaction avec ses émotions, actions, difficultés.",trap:"User Flow répond à 'par où il passe exactement'. Journey Map = expérience globale vécue."},
  {id:30,chapter:"p3",diff:"med",q:"Un User Flow répond à la question :",opts:["Pour qui tu développes ?","Comment il utilise ton produit ?","Par où il passe exactement dans l'application ?","Quels sont ses motivations ?"],ans:2,expl:"User Flow = représentation graphique montrant comment les utilisateurs naviguent sur une interface : flux de navigation + interactions.",trap:null},
  {id:31,chapter:"p3",diff:"hard",q:"La démarche itérative suit le cycle :",opts:["Analyse → Dév → Livraison","Concevoir → Prototype → Évaluer → Améliorer","Idéation → Test → Production","Planifier → Coder → Livrer"],ans:1,expl:"Démarche itérative : Concevoir → Prototype → Évaluer → Améliorer. Cycles répétés jusqu'à satisfaction avec évaluation formative.",trap:null},
  {id:32,chapter:"p3",diff:"med",q:"La démarche incrémentale se distingue de la démarche itérative car :",opts:["Elle est plus rapide","Elle travaille sur une seule zone de l'interface jusqu'à satisfaction","Elle implique les utilisateurs","Elle utilise des prototypes"],ans:1,expl:"Incrémental : travail sur une seule zone de l'interface jusqu'à satisfaction, puis ajout d'un incrément. Itératif : travail sur l'intégralité.",trap:"Itératif = toute l'interface. Incrémental = zone par zone."},
  {id:33,chapter:"p3",diff:"easy",q:"Un prototype Low Fidelity est :",opts:["Un prototype interactif et détaillé","Un prototype proche du produit final","Simple et rapide, dessin à la main","Un prototype codé"],ans:2,expl:"Low fidelity = simple et rapide, informel, dessin à la main. High fidelity = proche du produit final, design détaillé, interactif.",trap:null},
  {id:34,chapter:"p3",diff:"med",q:"L'ordre correct des étapes de prototypage est :",opts:["Wireframe → Sketch → Prototype","Sketch → Wireframe/Mockup → Prototype","Prototype → Mockup → Sketch","Mockup → Sketch → Wireframe"],ans:1,expl:"1. Croquis/Sketch (aperçu global), 2. Maquette/Wireframe/Mockup (détaillé sans interaction), 3. Prototype (version incomplète et interactive).",trap:null},
  {id:35,chapter:"p3",diff:"hard",q:"Le Zoning sert à :",opts:["Tester les fonctionnalités","Définir la structure et disposition des éléments avant l'arborescence","Présenter la structure grossière après l'arborescence","Créer le design graphique final"],ans:2,expl:"Le Zoning présente de manière simple et grossière (blocs) la structure et disposition des éléments. Il vient APRÈS l'arborescence.",trap:"Zoning vient après l'arborescence, AVANT le wireframe."},
  {id:36,chapter:"p3",diff:"med",q:"Un Wireframe contient :",opts:["Des couleurs et du design graphique","Du texte et boutons fictifs, sans couleurs ni design","Des animations interactives","Du code HTML"],ans:1,expl:"Wireframe = représentation détaillée sans design graphique. Chaque bloc contient texte/bouton fictif, sans couleurs ni design.",trap:null},
  {id:37,chapter:"p3",diff:"med",q:"La veille concurrentielle consiste à :",opts:["Observer les nouvelles technologies","Analyser les besoins clients","Observer les concurrents, leurs produits, prix, stratégies","Surveiller l'image de l'entreprise"],ans:2,expl:"Veille concurrentielle : observe les concurrents, leurs produits, prix, stratégies. La veille commerciale analyse les besoins clients.",trap:"Veille concurrentielle ≠ veille commerciale."},
  {id:38,chapter:"p3",diff:"hard",q:"Dans la représentation HTA, une alternative stricte signifie :",opts:["Plusieurs tâches en parallèle","OU exclusif : une seule manière est exécutée","OU non exclusif : plusieurs manières possibles","Tâches répétées en boucle"],ans:1,expl:"Alternative stricte = OU exclusif : une seule des manières est exécutée. Alternative non stricte = OU : peut s'exécuter de plusieurs manières.",trap:"Stricte = exclusif (XOR). Non stricte = inclusif (OR)."},
  {id:39,chapter:"p3",diff:"med",q:"Quelle est la différence entre Task Flow et User Flow ?",opts:["Task Flow = plusieurs scénarios, User Flow = scénario unique","Task Flow = chemin idéal pour une tâche, User Flow = tous les chemins possibles","Ils sont identiques","Task Flow est centré utilisateur, User Flow centré tâche"],ans:1,expl:"Task Flow : chemin idéal pour une tâche précise, un scénario, centré tâche. User Flow : tous les chemins possibles, plusieurs scénarios, centré utilisateur.",trap:null},
  {id:40,chapter:"p3",diff:"med",q:"L'approche Agile valorise :",opts:["Livraison du produit uniquement à la fin","Communication, partage, entraide, auto-gestion","Division stricte des étapes sans interactions","Planification rigide"],ans:1,expl:"Approche Agile : communication, partage des infos, points de vue complémentaires, entraide, auto-discipline et autogestion.",trap:"L'approche classique livre le produit uniquement à la fin. L'Agile livre en continu."},
  {id:41,chapter:"p3",diff:"hard",q:"Un composant de Persona inclut (plusieurs réponses) :",opts:["Données générales","Objectifs (besoins)","Contraintes","Motivations et freins"],ans:[0,1,2,3],expl:"Composants d'un persona : données générales, objectifs (besoins), contraintes (manque de temps, budget), motivations (ce qui déclenche ses actes), freins (ce qui peut le bloquer).",trap:null},
  {id:42,chapter:"p3",diff:"med",q:"Dans le modèle de la tâche, une tâche élémentaire est :",opts:["La tâche principale","Une tâche qu'on ne peut plus décomposer en sous-tâches","Un objectif global","Une procédure complète"],ans:1,expl:"Tâche élémentaire = tâche qu'on ne peut plus décomposer en sous-tâches (opérations E/S).",trap:null},
  {id:43,chapter:"p3",diff:"hard",q:"Dans l'interface, quel agencement garde l'écran affiché en permanence ?",opts:["Séquentiel","Alternatif","Itératif","Simultané"],ans:2,expl:"Impact itératif sur l'interface : l'écran reste affiché (répétition de la même tâche).",trap:null},
  {id:44,chapter:"p3",diff:"med",q:"La veille e-réputation surveille :",opts:["Les nouvelles technologies","Les lois et normes","L'image de l'entreprise, avis clients, réseaux sociaux","Les besoins clients"],ans:2,expl:"Veille e-réputation : image de l'entreprise, avis clients, commentaires sur réseaux sociaux.",trap:null},
  // PARTIE 4
  {id:45,chapter:"p4",diff:"easy",q:"Le Design Thinking est :",opts:["Une méthode de codage","Une approche centrée utilisateur pour comprendre les besoins et concevoir des solutions adaptées","Un logiciel de design","Une méthode de gestion de projet"],ans:1,expl:"Design Thinking = approche centrée utilisateur pour comprendre ses besoins et concevoir des solutions adaptées et innovantes.",trap:null},
  {id:46,chapter:"p4",diff:"med",q:"Combien d'étapes principales compte le Design Thinking ?",opts:["3","5","7","9"],ans:1,expl:"5 étapes : Empathie, Définition, Idéation, Prototyper, Test. Ces étapes sont cycliques, pas linéaires.",trap:"Les étapes ne sont PAS linéaires mais cycliques."},
  {id:47,chapter:"p4",diff:"med",q:"Le Business Thinking utilise un raisonnement :",opts:["Abductif","Intuitif","Déductif","Inductif"],ans:2,expl:"Business Thinking = raisonnement déductif, logique, preuves, décision rapide. Design Thinking = raisonnement abductif, intuitif.",trap:"Business = déductif. Design = abductif."},
  {id:48,chapter:"p4",diff:"hard",q:"Les 3 critères pour valider une idée en Design Thinking sont :",opts:["Désirabilité, Faisabilité, Viabilité","Utile, Utilisable, Désirable","Empathie, Idéation, Test","Rapidité, Beauté, Coût"],ans:0,expl:"3 critères : Désirabilité (conforme attentes clients), Faisabilité (utile et réalisable), Viabilité (peut fonctionner économiquement). La croisée = design d'innovation.",trap:null},
  {id:49,chapter:"p4",diff:"med",q:"La phase d'Exploration dans le Process UX permet de :",opts:["Créer les prototypes","Identifier les besoins utilisateurs","Planifier le projet","Évaluer les solutions"],ans:1,expl:"Étape 2 du Process UX = Exploration : identifier les besoins utilisateurs via interview, questionnaire, sonde culturelle, observation, personas, carte d'empathie.",trap:null},
  {id:50,chapter:"p4",diff:"easy",q:"Un brainstorming idéal réunit :",opts:["Un seul expert pendant 3h","Un grand groupe homogène","Un petit groupe avec profils différents, moins d'1h","Uniquement des designers"],ans:2,expl:"Brainstorming : petit groupe avec profils différents, moins d'1h. Générer une grande quantité puis les classifier.",trap:null},
  {id:51,chapter:"p4",diff:"med",q:"Un Focus Group compte idéalement :",opts:["2-3 personnes","7-10 personnes","20-30 personnes","50 personnes"],ans:1,expl:"Focus group : 7-10 personnes, 1-2 heures. Discussion en groupe pour comprendre opinions et besoins.",trap:"Brainstorming = petit groupe. Focus group = 7-10 personnes."},
  {id:52,chapter:"p4",diff:"hard",q:"La Sonde Culturelle est :",opts:["Un questionnaire en ligne","Un test utilisateur en laboratoire","Une méthode où l'utilisateur transcrit son expérience via un kit fourni","Une interview directe"],ans:2,expl:"Sonde culturelle : demander aux utilisateurs de transcrire leur expérience à l'aide d'un Kit. Méthode qualitative, petit nombre, début de projet.",trap:null},
  {id:53,chapter:"p4",diff:"med",q:"La carte d'empathie capture :",opts:["Les données SEO","Ce que l'utilisateur dit, pense, voit, entend, fait, ressent","Les performances techniques","Les revenus du produit"],ans:1,expl:"Carte d'empathie : ce qu'il dit, pense, voit, entend, fait, ressent. Pour comprendre profondément l'utilisateur.",trap:null},
  {id:54,chapter:"p4",diff:"med",q:"Le Story Mapping sert à :",opts:["Raconter l'histoire sous forme de dessins","Construire l'architecture de l'information","Comprendre le parcours d'utilisation","Créer des scénarios textuels"],ans:2,expl:"Story mapping : comprendre le parcours d'utilisation. Storyboarding = raconter l'histoire sous forme de dessins. Tri par cartes = architecture info.",trap:"Story mapping ≠ Storyboarding."},
  {id:55,chapter:"p4",diff:"hard",q:"L'inspection cognitive consiste à :",opts:["Demander aux utilisateurs de tester","Évaluer une interface en se mettant à la place de l'utilisateur","Analyser les statistiques d'usage","Corriger le code"],ans:1,expl:"Inspection cognitive : évaluer une interface par un expert en se mettant à la place de l'utilisateur.",trap:"Inspection cognitive ≠ audit ergonomique (audit = par experts UX/ergonomie)."},
  {id:56,chapter:"p4",diff:"med",q:"La gamification en UX design signifie :",opts:["Créer des jeux vidéo","Utiliser des mécanismes du jeu pour motiver les utilisateurs","Tester l'interface en conditions de jeu","Concevoir des interfaces ludiques uniquement"],ans:1,expl:"Gamification : utiliser des mécanismes du jeu pour motiver les utilisateurs à utiliser le produit.",trap:null},
  {id:57,chapter:"p4",diff:"med",q:"Le tri par cartes sert à :",opts:["Tester les performances","Construire l'architecture de l'information","Générer des idées","Évaluer les émotions"],ans:1,expl:"Tri par cartes = construire l'architecture de l'information. Permet aux utilisateurs d'organiser les contenus selon leur logique.",trap:null},
  {id:58,chapter:"p4",diff:"hard",q:"Qu'est-ce qu'un Scénario d'usage ?",opts:["Un diagramme UML","Une description textuelle ou graphique d'une situation concrète d'utilisation du produit","Un test d'ergonomie","Un prototype haute fidélité"],ans:1,expl:"Scénario d'usage : décrit une situation concrète où l'utilisateur utilise un produit (texte ou dessin).",trap:null},
  {id:59,chapter:"p3",diff:"hard",q:"Dans une tâche parallèle (HTA), quand est-elle terminée ?",opts:["Quand une seule tâche est terminée","Quand toutes les tâches obligatoires ont été exécutées","Quand la tâche principale est finie","Après un délai fixé"],ans:1,expl:"Une tâche parallèle se termine quand toutes ses tâches obligatoires ont été exécutées. À un instant donné, une et une seule s'exécute.",trap:"Structure simultanée = plusieurs tâches en parallèle EN MÊME TEMPS (multi-opérateurs). Parallèle = une seule à la fois."},
  {id:60,chapter:"p1",diff:"hard",q:"La veille stratégique consiste principalement à :",opts:["Développer de nouveaux produits","Collecter, analyser et diffuser des informations sur l'environnement de l'entité","Former les utilisateurs","Tester l'ergonomie des interfaces"],ans:1,expl:"Veille stratégique : processus mis en place par une entité qui collecte, analyse et diffuse des informations sur son environnement (marché, concurrents, clients, technologies).",trap:null},
  {id:61,chapter:"p3",diff:"med",q:"La conception en parallèle consiste à :",opts:["Faire travailler plusieurs équipes sur le même design","Créer plusieurs interfaces et sélectionner leurs points forts","Déployer l'interface sur plusieurs plateformes","Tester en parallèle deux prototypes"],ans:1,expl:"Conception en parallèle : créer plusieurs interfaces et sélectionner leurs points forts pour les combiner.",trap:null},
  {id:62,chapter:"p2",diff:"hard",q:"La loi de Fitts : que signifie D et L dans la formule T = I.log₂(2D/L) ?",opts:["D = délai, L = longueur","D = distance à la cible, L = taille de la cible","D = dimensions, L = limite","D = données, L = largeur"],ans:1,expl:"T = I.log₂(2D/L) : D = distance à la cible, L = taille (largeur) de la cible. Plus D est grand ou L est petit, plus T est élevé.",trap:null},
  {id:63,chapter:"p4",diff:"med",q:"Quel est l'ordre des outils UI dans la génération des solutions ?",opts:["Wireframe → Mockup → Zoning → Prototype","Zoning → Wireframe → Mockup → Prototype","Sketch → Zoning → Prototype","Mockup → Wireframe → Zoning"],ans:1,expl:"Ordre : Zoning (structure grossière) → Wireframe (représentation détaillée sans design) → Mockup → Prototype.",trap:null},
  {id:64,chapter:"p1",diff:"med",q:"L'informatique multimodale désigne :",opts:["L'utilisation de plusieurs types de données","Les différents types d'interaction","La combinaison de multimédia et virtualité","L'interface tactile uniquement"],ans:1,expl:"Multimodalité = types d'interaction (différentes modalités d'entrée/sortie). Multimédia = combinaison de types de données.",trap:"Multimédia (données) ≠ multimodalité (interaction)."},
  {id:65,chapter:"p3",diff:"easy",q:"L'évaluation formative dans la démarche itérative sert à :",opts:["Livrer le produit final","Trouver les points faibles et améliorer progressivement","Valider le cahier des charges","Tester uniquement la performance"],ans:1,expl:"Évaluation formative : trouver les points faibles et permettre une amélioration progressive (pas une validation finale = évaluation sommative).",trap:null},
  {id:66,chapter:"p3",diff:"easy",q:"L'oculométrie (Eye Tracking) permet d'analyser :",opts:["Les mouvements des mains sur la souris","Où une personne regarde sur un écran","La vitesse de frappe au clavier","L'activité cérébrale"],ans:1,expl:"L'oculométrie (Eye Tracking) permet d'analyser où une personne regarde sur un écran via des lunettes ou simulateurs.",trap:null},
  {id:67,chapter:"p3",diff:"med",q:"Quels sont les parcours typiques de l'œil sur un écran ? (plusieurs réponses)",opts:["Parcours en Z","Parcours en F","Parcours en X","Parcours sélectif"],ans:[0,1,3],expl:"Les parcours typiques de l'écran sont : en Z, en F, ou sélectif (mots clés, titres, boutons).",trap:"Le parcours en X n'est pas un parcours type reconnu en ergonomie."},
  {id:68,chapter:"p3",diff:"med",q:"Dans un schéma type d'écran, où se trouve généralement la zone de travail ?",opts:["En haut, au-dessus des commandes","À gauche de la zone de sélection","Au centre/droite, encadrée par les commandes et la sélection","En bas, sous les messages optionnels"],ans:2,expl:"Schéma type : Commandes en haut, Zone de sélection à gauche/droite, Zone de travail au centre, Messages optionnels en bas.",trap:null},
  {id:69,chapter:"p3",diff:"easy",q:"Le style de design 'Skeuomorphisme' se caractérise par :",opts:["Un minimalisme extrême","L'imitation d'objets du monde réel","Des règles définies exclusivement par Google","Un système dynamique pour produits Microsoft"],ans:1,expl:"Le skeuomorphisme est un style graphique qui imite les objets du monde réel (ex: une corbeille qui ressemble à une vraie corbeille de bureau).",trap:null},
  {id:70,chapter:"p3",diff:"med",q:"Le 'Material Design' a été défini par :",opts:["Apple","Microsoft","Google","Facebook"],ans:2,expl:"Le Material Design est défini par Google : un ensemble de règles et d'interactions destiné à un écosystème applicatif inspiré du monde réel.",trap:null},
  {id:71,chapter:"p3",diff:"hard",q:"Quels sont les risques associés aux méthodes de conception classiques (Merise, Cascade) ?",opts:["Implication limitée des utilisateurs","Livraison trop rapide","Méthode centrée utilisateur uniquement","Effet tunnel"],ans:[0,3],expl:"Les risques sont une implication limitée des utilisateurs et l'effet tunnel (le client ne voit rien jusqu'à la livraison finale).",trap:null},

const FLASHCARDS = [

  {id:17,chapter:"p3",front:"Journey Map vs User Flow vs Task Flow",back:"<strong>Journey Map</strong> = comment il vit l'expérience<br><strong>User Flow</strong> = tous les chemins possibles (navigation libre)<br><strong>Task Flow</strong> = chemin idéal pour une tâche précise"},

const EXERCISES = [
  {id:1,chapter:"p1",diff:"easy",title:"Classer UI, UX et CX",context:"Vous travaillez sur un site e-commerce. On vous demande de préciser qui est responsable de quoi.",task:"Associez chaque domaine (UI, UX, CX) à sa responsabilité principale et donnez un exemple concret pour chaque.",hint:"UI = visuel, UX = expérience produit, CX = relation globale entreprise-client.",solution:`UI Designer → Conception visuelle et interactions directes
Exemple : choix des couleurs des boutons, placement des menus.

UX Designer → Expérience globale du produit
Exemple : parcours d'achat sans friction, clarté des étapes de commande.

CX (Customer Experience) → Relation client-entreprise (avant/pendant/après)
Exemple : email de confirmation, service après-vente, programme fidélité.

// Clé : CX englobe UX qui englobe UI.`,piege:"Ne pas confondre UX (produit) et CX (entreprise). Le CX inclut tout ce qui n'est pas le produit lui-même."},
  {id:2,chapter:"p2",diff:"med",title:"Appliquer la loi de Fitts",context:"Vous devez placer un bouton CTA (Call To Action) sur une page mobile.",task:"En vous basant sur la loi de Fitts T = I.log₂(2D/L), expliquez 3 décisions de design concrètes pour minimiser T.",hint:"Agir sur D (distance) et L (taille de la cible).",solution:`Loi de Fitts : T = I.log₂(2D/L)
Pour minimiser T (temps d'atteinte) :

1. Réduire D (distance) :
   → Placer le bouton CTA en bas de l'écran (zone du pouce sur mobile)
   → Éviter de placer les éléments importants en haut de grands écrans

2. Augmenter L (taille de la cible) :
   → Bouton de minimum 44×44px (recommandation Apple HIG)
   → Augmenter la zone cliquable même si le visuel est plus petit

3. Exploiter les "bords magiques" :
   → Les bords d'écran ont une taille infinie (le curseur s'arrête)
   → Placer des éléments importants sur les bords (ex: macOS Dock)`,piege:"Oublier que la loi de Fitts s'applique aussi à la souris. Sur desktop, les coins d'écran sont les cibles les plus rapides à atteindre."},
  {id:3,chapter:"p2",diff:"easy",title:"Loi de Hick – Simplifier un menu",context:"Un site propose un menu avec 15 éléments au même niveau. Les utilisateurs se plaignent d'être perdus.",task:"Proposez une restructuration en appliquant la loi de Hick. Justifiez chaque décision.",hint:"Regrouper, hiérarchiser, supprimer le superflu.",solution:`Loi de Hick : temps de décision augmente avec le nombre de choix.

PROBLÈME : 15 éléments = surcharge cognitive massive

SOLUTION :
1. Regrouper en catégories (max 5-7 catégories)
   Ex: [Accueil] [Produits] [À propos] [Blog] [Contact]

2. Utiliser des sous-menus pour les éléments secondaires
   → Apparaissent seulement au survol/clic

3. Hiérarchiser par fréquence d'usage
   → Les éléments les plus utilisés en premier

4. Supprimer les doublons et éléments peu utilisés
   → Analyse des analytics pour identifier

// Règle : limiter à 7±2 choix au même niveau (MCT)`,piege:"Ne pas tomber dans le piège inverse : trop peu de choix force trop de clics (violation du principe des 3 clics). Trouver l'équilibre."},
  {id:4,chapter:"p3",diff:"med",title:"Créer un Persona",context:"Vous développez une app de gestion de budget pour jeunes actifs (25-35 ans).",task:"Créez un persona complet avec tous ses composants. Justifiez chaque élément.",hint:"Composants : données générales, objectifs, contraintes, motivations, freins.",solution:`PERSONA : "Sophie, 28 ans"

DONNÉES GÉNÉRALES :
- Âge : 28 ans, célibataire
- Profession : Chargée de communication
- Revenu : 2200€/mois
- Tech : Utilisatrice avancée (smartphone quotidien)

OBJECTIFS :
- Suivre ses dépenses en temps réel
- Économiser pour un voyage (objectif 6 mois)
- Éviter les fins de mois difficiles

CONTRAINTES :
- Peu de temps : utilise l'app en transports
- Budget limité pour les abonnements premium

MOTIVATIONS :
- Sentiment de contrôle et sécurité financière
- Notifications de félicitations quand elle atteint ses objectifs

FREINS :
- Peur de la complexité (a abandonné 2 apps similaires)
- Méfiance sur la sécurité des données bancaires

// Ce persona N'EST PAS une personne réelle mais une synthèse de données.`,piege:"Un persona N'EST PAS inventé arbitrairement. Il doit être basé sur des données réelles (interviews, questionnaires). Sans données = persona invalide."},
  {id:5,chapter:"p3",diff:"hard",title:"Analyser une HTA",context:"Tâche : 'Commander un pizza en ligne'",task:"Décomposez cette tâche en HTA complète. Identifiez le type d'enchaînement pour chaque groupe de sous-tâches.",hint:"Types : séquence, parallèle, alternative, boucle.",solution:`HTA : Commander une pizza en ligne

0. Commander une pizza
  1. Choisir le restaurant [Alternative non stricte]
     1.1 Chercher par localisation
     1.2 Filtrer par notes
     1.3 Voir les promotions
  2. Composer la commande [Séquence + Boucle]
     2.1 Choisir la pizza [Alternative stricte]
     2.2 Personnaliser les ingrédients [Suite non ordonnée]
     2.3 Ajouter au panier
     2.4 Boucle : ajouter d'autres articles
  3. Valider la commande [Séquence obligatoire]
     3.1 Vérifier le panier
     3.2 Choisir livraison ou retrait [Alternative stricte]
     3.3 Entrer adresse
     3.4 Choisir paiement [Alternative stricte]
     3.5 Confirmer

// Tâche élémentaire = ne peut plus se décomposer (ex: "entrer adresse")`,piege:"Alternative STRICTE (XOR) = une seule option possible. Alternative NON STRICTE (OR) = plusieurs possibles. Ne pas les inverser."},
  {id:6,chapter:"p4",diff:"med",title:"Construire une Carte d'Empathie",context:"Vous étudiez les utilisateurs d'une application de méditation pour salariés stressés.",task:"Remplissez une carte d'empathie complète pour cet utilisateur type. Utilisez les 6 dimensions.",hint:"Dit, Pense, Voit, Entend, Fait, Ressent.",solution:`CARTE D'EMPATHIE – Salarié stressé

DIT :
"J'ai besoin de décompresser mais je n'ai pas le temps."
"Les apps de méditation, c'est compliqué à prendre en main."

PENSE :
Qu'il devrait prendre soin de lui mais se sent coupable de le faire au travail.
Que la méditation c'est réservé à d'autres personnes.

VOIT :
Ses collègues également stressés · Des articles sur le burnout
Notifications de l'app de travail qui débordent

ENTEND :
Son manager dire "on doit être plus productifs"
Des podcasts sur le bien-être recommandés par des amis

FAIT :
Consulte l'app pendant sa pause déjeuner (5-10 min max)
Abandonne si l'exercice dure trop longtemps

RESSENT :
Anxiété · Culpabilité · Envie de se sentir mieux
Frustration face aux interfaces complexes`,piege:"La carte d'empathie doit être basée sur des données réelles (observation, interview), pas inventée. Chaque dimension doit être renseignée séparément."},
  {id:7,chapter:"p4",diff:"easy",title:"Business Thinking vs Design Thinking",context:"Votre équipe doit décider comment réagir à un retour utilisateur négatif sur une fonctionnalité.",task:"Décrivez comment l'approche Business et l'approche Design Thinking traiteraient ce problème différemment.",hint:"Logique déductive vs abductive. Preuves vs What if.",solution:`PROBLÈME : Les utilisateurs abandonnent la page de paiement.

BUSINESS THINKING :
- Analyse des métriques (taux de conversion, tunnel de vente)
- Raisonnement déductif : si taux chute à l'étape X → problème à X
- Décision rapide : "On simplifie le formulaire de paiement"
- Preuve requise avant action
- Inconfort avec l'ambiguïté

DESIGN THINKING :
- Interviews utilisateurs pour comprendre le ressenti
- Raisonnement abductif : "Et si le problème n'était pas le formulaire mais la confiance ?"
- Exploration de plusieurs hypothèses (manque de badges sécurité ? trop d'étapes ? confusion ?)
- Prototypage rapide de 3 solutions différentes
- Test et itération

// Idéal : combiner les deux → données quantitatives + empathie qualitative`,piege:"Design Thinking n'est PAS opposé au Business Thinking. Les deux sont complémentaires. Ne pas présenter l'un comme supérieur à l'autre."},
  {id:8,chapter:"p3",diff:"hard",title:"Choisir la bonne démarche de conception",context:"Vous devez refondre une interface bancaire complexe avec des contraintes de temps strictes.",task:"Comparez les démarches itérative, incrémentale et mixte. Recommandez la plus adaptée et justifiez.",hint:"Itératif = toute l'interface. Incrémental = zone par zone. Mixte = les deux.",solution:`DÉMARCHE ITÉRATIVE :
+ Amélioration progressive de toute l'interface
+ Prend en compte de nouveaux objectifs
- Risque si tout est à refaire simultanément
- Peut être long avant une livraison partielle

DÉMARCHE INCRÉMENTALE :
+ Livraisons partielles rapides (fonctionnel zone par zone)
+ Retours précoces des utilisateurs
- Une zone peut influencer une autre non encore développée
- Vision globale moins cohérente

DÉMARCHE MIXTE (recommandée) :
→ Découper l'interface en zones critiques (incrément)
→ Itérer sur chaque incrément (prototype → évaluation → amélioration)
→ Livraisons régulières tout en maintenant la qualité

POUR UNE BANQUE :
- Incrément 1 : Page d'authentification (critique, sécurisée)
- Incrément 2 : Tableau de bord principal
- Itération sur chaque incrément avec tests utilisateurs`,piege:"Ne pas confondre itération (améliorer ce qui existe) avec incrément (ajouter quelque chose de nouveau). On peut itérer sur un incrément."},
  {id:9,chapter:"p2",diff:"med",title:"MCT et conception d'interface",context:"Vous concevez un formulaire d'inscription avec 12 champs.",task:"Comment la connaissance de la MCT doit-elle influencer la conception de ce formulaire ? Proposez 3 principes concrets.",hint:"MCT = 7±3 items, 15-30 sec d'oubli, accès séquentiel.",solution:`MCT : 7±3 items · oubli en 15-30 sec · accès séquentiel

PRINCIPE 1 : Chunking (regroupement)
→ Regrouper les 12 champs en étapes thématiques
Ex : Étape 1 "Identité" (3 champs) · Étape 2 "Contact" (3 champs) · Étape 3 "Sécurité" (3 champs)
→ Jamais plus de 7 éléments visibles simultanément

PRINCIPE 2 : Feedback immédiat
→ Valider chaque champ en temps réel (avant la soumission)
→ L'utilisateur ne peut pas mémoriser les erreurs à corriger plus tard

PRINCIPE 3 : Auto-complétion et réduction de la charge
→ Pré-remplir les champs connus (localisation, suggestions)
→ Éviter que l'utilisateur mémorise des infos entre étapes
→ Afficher les critères de mot de passe directement à côté du champ`,piege:"L'accès à la MCT est SÉQUENTIEL : l'utilisateur doit parcourir les items dans l'ordre. Ne pas présenter des listes non ordonnées d'éléments critiques."},
  {id:10,chapter:"p4",diff:"hard",title:"Conduire une interview UX",context:"Vous préparez une session d'interview pour comprendre les besoins des utilisateurs d'une app de transport.",task:"Rédigez 5 questions d'interview respectant les bonnes pratiques UX. Expliquez le type de chaque question.",hint:"Questions semi-directives, neutres, reformulation, analyse qualitative.",solution:`BONNES PRATIQUES : individuel, face à face, <1h, neutre, semi-directif

QUESTION 1 (ouverte/exploratoire) :
"Pouvez-vous me décrire la dernière fois que vous avez utilisé une app de transport ?"
→ Obtenir un récit naturel sans orienter

QUESTION 2 (comportementale) :
"Qu'est-ce que vous faites habituellement quand vous cherchez un trajet urgent ?"
→ Comprendre les comportements réels, pas les intentions

QUESTION 3 (problème/friction) :
"Y a-t-il des moments où cette app vous a frustré ou déçu ? Pouvez-vous me raconter ?"
→ Identifier les points de douleur

QUESTION 4 (motivation) :
"Qu'est-ce qui vous ferait préférer une app plutôt qu'une autre pour vos trajets ?"
→ Identifier les motivations profondes

QUESTION 5 (reformulation) :
"Si je comprends bien, vous dites que... Est-ce exact ?"
→ Valider la compréhension, éviter les malentendus

// À ÉVITER : questions fermées (oui/non), suggestives ("ne trouvez-vous pas que..."), doubles (deux questions en une)`,piege:"Une interview N'EST PAS un questionnaire. Elle est qualitative, subjective, et doit explorer en profondeur. Ne jamais orienter les réponses."},
  {id:11,chapter:"p1",diff:"easy",title:"Identifier les rôles dans une équipe",context:"Une startup tech recrute pour son équipe produit.",task:"Distinguez clairement les rôles : Web developer, Designer, UI Designer, UX Designer. Donnez 2 responsabilités concrètes pour chacun.",hint:"Chaque rôle a une spécialisation distincte.",solution:`WEB DEVELOPER :
1. Développer les fonctionnalités front/back (HTML, CSS, JS, API)
2. Assurer la performance et la compatibilité du code

DESIGNER :
1. Créer l'apparence visuelle de la solution digitale
2. Définir la charte graphique et les éléments visuels

UI DESIGNER :
1. Concevoir l'interface (grilles, typographie, icônes, couleurs, boutons)
2. Optimiser les parcours et la clarté de navigation

UX DESIGNER :
1. Insérer des scénarios d'usage et étudier les émotions
2. Analyser et répondre aux besoins (accessibilité, crédibilité, productivité)

// Règle : UI Designer = conception. UX Designer = expérience. Les deux collaborent étroitement.`,piege:"UI ≠ UX. Un UI Designer peut faire un beau design mais mauvaise UX. Un UX Designer sans UI peut avoir une bonne expérience mais un interface peu attrayante."},
  {id:12,chapter:"p3",diff:"med",title:"Types de veille stratégique",context:"Une entreprise lance une nouvelle application de livraison alimentaire.",task:"Pour chaque type de veille, identifiez 2 informations concrètes à collecter pour ce projet.",hint:"5 types : concurrentielle, commerciale, réglementaire, e-réputation, technologique.",solution:`VEILLE CONCURRENTIELLE :
- Prix pratiqués par Uber Eats, Deliveroo, etc.
- Fonctionnalités différenciantes des concurrents directs

VEILLE COMMERCIALE :
- Habitudes de commande (heure, fréquence, panier moyen)
- Tendances : végétarien, alimentation saine, local

VEILLE RÉGLEMENTAIRE :
- Réglementation sur les données personnelles (RGPD)
- Lois sur le statut des livreurs (travailleurs indépendants)

VEILLE E-RÉPUTATION :
- Avis Google/Trustpilot des concurrents
- Commentaires sur les réseaux sociaux sur l'expérience de livraison

VEILLE TECHNOLOGIQUE :
- Nouveaux systèmes de géolocalisation en temps réel
- IA pour optimisation des itinéraires`,piege:"La veille stratégique n'est pas ponctuelle. C'est un PROCESSUS CONTINU. Ne pas confondre veille avec étude de marché (ponctuelle)."},
  {id:13,chapter:"p4",diff:"hard",title:"Planifier une session de brainstorming",context:"Vous organisez un brainstorming pour trouver des fonctionnalités pour une app de covoiturage.",task:"Décrivez comment organiser cette session en suivant les bonnes pratiques UX. Incluez les règles, le déroulement et les livrables.",hint:"Petit groupe, profils différents, <1h, générer puis classifier.",solution:`ORGANISATION DU BRAINSTORMING

PARTICIPANTS :
- 5-7 personnes (pas plus → loi de Hick)
- Profils différents : designer, dev, marketing, utilisateur réel, PM
- Un facilitateur neutre

RÈGLES (à afficher) :
1. Pas de jugement pendant la génération
2. Toutes les idées sont bienvenues (même folles)
3. Construire sur les idées des autres (oui, ET...)
4. Quantité avant qualité

DÉROULEMENT (<1h) :
- 5 min : contexte et objectif clair
- 20 min : génération libre (post-its, tous en parallèle)
- 15 min : lecture et clustering (regroupement thématique)
- 15 min : vote et priorisation (dot voting)

LIVRABLES :
- Carte des idées organisées par thème
- Top 3 idées prioritaires à prototyper
- Liste complète archivée (pour référence future)`,piege:"Le brainstorming ne produit PAS des solutions finales. Il génère des pistes à prototyper et tester. Les idées non retenues ne sont pas mauvaises, juste déprioritisées."},
  {id:14,chapter:"p3",diff:"easy",title:"Sketch vs Wireframe vs Prototype",context:"Un chef de projet vous demande de 'faire un prototype' de la page d'accueil.",task:"Clarifiez les 3 étapes. Quand utiliser chacune ? Quelle est la différence entre Mockup et Wireframe ?",hint:"Sketch = grossier, Wireframe = détaillé sans design, Mockup = avec design, Prototype = interactif.",solution:`1. SKETCH (Croquis) :
   - Dessin à la main, 5-10 minutes
   - Objectif : aperçu global, idée générale
   - Usage : toute première étape, exploration libre
   - Pas de détails, pas d'interaction

2. WIREFRAME :
   - Représentation détaillée SANS design graphique
   - Contenu fictif (Lorem ipsum, images grises)
   - SANS couleurs, SANS design
   - Objectif : présenter l'organisation spécifique des éléments
   
3. MOCKUP :
   - Wireframe + design graphique appliqué
   - Couleurs, typographies, images réelles
   - PAS interactif (image statique du produit final)

4. PROTOTYPE :
   - Version fonctionnelle mais incomplète
   - Interactif (on peut cliquer, naviguer)
   - Objectif : tester, valider, attirer investisseurs

ORDRE : Sketch → Wireframe → Mockup → Prototype`,piege:"Mockup ≠ Prototype. Le mockup est statique (on voit), le prototype est interactif (on utilise). Souvent confondus dans le langage courant."},
  {id:15,chapter:"p4",diff:"med",title:"Évaluer une interface par inspection cognitive",context:"Vous évaluez une nouvelle fonctionnalité d'un site de réservation de voyages.",task:"Décrivez la démarche d'inspection cognitive en 4 questions clés. Appliquez-les à la tâche 'réserver un vol'.",hint:"Se mettre à la place de l'utilisateur. Vérifier chaque étape.",solution:`INSPECTION COGNITIVE : évaluer en se mettant à la place de l'utilisateur

4 QUESTIONS CLÉS pour chaque étape :
Q1 : L'utilisateur essaiera-t-il d'atteindre le bon effet ?
Q2 : Verra-t-il l'action disponible (bouton, lien) ?
Q3 : Comprendra-t-il que l'action est correcte ?
Q4 : Recevra-t-il un feedback adéquat après l'action ?

APPLICATION : "Réserver un vol"

Étape 1 : Saisir la destination
Q1 : L'utilisateur cherche-t-il un champ de recherche ? ✓
Q2 : Le champ est-il visible ? ✓ (si bien placé)
Q3 : Le label "Destination" est-il clair ? À vérifier
Q4 : L'autocomplétion confirme-t-elle la saisie ? À vérifier

Étape 2 : Sélectionner les dates
Q1 : L'utilisateur cherche un calendrier ? ✓
Q2 : L'icône calendrier est-elle visible ? À vérifier
Q3 : Le format de date est-il clair (JJ/MM vs MM/JJ) ? Risque !
Q4 : La date sélectionnée est-elle confirmée visuellement ? À vérifier`,piege:"L'inspection cognitive est réalisée PAR UN EXPERT, pas par l'utilisateur. Ne pas la confondre avec un test utilisateur (où c'est l'utilisateur qui teste)."},
  {id:16,chapter:"p3",diff:"med",title:"Schéma d'écran & Architecture",context:"Vous concevez une application de retouche photo professionnelle sur desktop.",task:"Choisiriez-vous une architecture en série ou en Workbench ? Justifiez en utilisant le vocabulaire du cours.",hint:"Workbench = tout visible. Série = étape par étape.",solution:`Choix : WORKBENCH
Car l'utilisateur a besoin d'avoir accès simultanément à :
1. Zone de travail (la photo au centre)
2. Zone de commandes (outils, filtres en haut/côtés)
3. Zone de sélection (calques, historique)
Une utilisation en série (étape par étape) n'est pas adaptée pour la création graphique où l'on effectue des va-et-vient constants.`,piege:"Le mode série est adapté pour des processus linéaires (paiement, assistant d'installation). Workbench est idéal pour la productivité."},
  {id:17,chapter:"p3",diff:"easy",title:"Styles de Design UI",context:"On vous demande de refondre une vieille application en lui donnant un style moderne, qui unifie l'expérience sur Windows, ou bien en utilisant les guidelines de Google.",task:"Associez les termes 'Material Design', 'Fluent Design', 'Flat' et 'Skeuomorphisme' à leurs définitions.",hint:"Google, Microsoft, Imite le réel, Minimaliste.",solution:`1. Material Design → Google (inspiré du monde physique, ombres, règles)
2. Fluent Design → Microsoft (expérience immersive et dynamique)
3. Flat Design → Minimaliste (pas de 3D, pas d'ombres complexes)
4. Skeuomorphisme → Imite le monde réel (cuir, métal, reliefs purs)`,piege:"Ne pas confondre Material (qui a des ombres et de la profondeur de base) avec le Flat (qui est totalement plat)."},
];

let state = JSON.parse(localStorage.getItem('uiux_state') || 'null') || {
  answered: {}, // id -> {selected, correct}
  bookmarked: {},
  fcStates: {}, // id -> 'review'|'medium'|'mastered'
  exCompleted: {},
  currentQ: 0,
  currentFC: 0,
  mode: 'all',
  fcMode: 'all',
  fcChapter: 'all',
  quizDone: false,
  timerActive: false,
  timerSeconds: 0,
};
let currentPool = [];
let timerInterval = null;
let fcPool = [];
let fcIdx = 0;

function saveState(){localStorage.setItem('uiux_state', JSON.stringify(state));}

// ============================================================
// TAB ROUTER
// ============================================================
function switchTab(name, btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(btn) btn.classList.add('active');
  if(name==='qcm') renderDashboard();
  if(name==='flashcards') renderFC();
  if(name==='cheatsheet') renderCS();
  if(name==='traps') renderTraps();
  if(name==='exercises') renderExercises();
}

// Scroll progress
window.addEventListener('scroll',()=>{
  const pct = window.scrollY/(document.body.scrollHeight-window.innerHeight)*100;
  document.getElementById('scroll-bar').style.width=pct+'%';
});

// ============================================================
// DASHBOARD
// ============================================================
function renderDashboard(){
  const total = QUESTIONS.length;
  const answered = Object.keys(state.answered).length;
  const correct = Object.values(state.answered).filter(a=>a.correct).length;
  const wrong = answered - correct;
  const mastered = Object.values(state.fcStates).filter(s=>s==='mastered').length;
  const pct = answered ? Math.round(correct/total*100) : 0;
  document.getElementById('dashboard').innerHTML=`
    <div class="dash-card"><div class="dval">${answered}/${total}</div><div class="dlbl">Questions répondues</div><div class="progress-bar"><div class="progress-fill" style="width:${answered/total*100}%"></div></div></div>
    <div class="dash-card"><div class="dval" style="color:var(--success)">${correct}</div><div class="dlbl">Correctes</div></div>
    <div class="dash-card"><div class="dval" style="color:var(--danger)">${wrong}</div><div class="dlbl">Erreurs</div></div>
    <div class="dash-card"><div class="dval" style="color:var(--warning)">${pct}%</div><div class="dlbl">Score global</div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:var(--warning)"></div></div></div>
    <div class="dash-card"><div class="dval" style="color:var(--secondary)">${mastered}/${FLASHCARDS.length}</div><div class="dlbl">Flashcards maîtrisées</div></div>
  `;
}

// ============================================================
// QCM ENGINE
// ============================================================
function setMode(mode, btn){
  state.mode = mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(mode==='timed' && !state.timerActive){
    state.timerSeconds = 0;
    state.timerActive = true;
    if(timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(()=>{state.timerSeconds++;renderTimer();},1000);
  } else if(mode!=='timed'){
    state.timerActive = false;
    if(timerInterval) clearInterval(timerInterval);
  }
  buildPool();
  renderQCM();
}

function renderTimer(){
  const t = document.getElementById('timer-display');
  if(t){const m=Math.floor(state.timerSeconds/60),s=state.timerSeconds%60;t.textContent=`${m}:${s<10?'0'+s:s}`;}
}

function buildPool(){
  let pool = [...QUESTIONS];
  if(state.mode==='weak'){
    const weakChapters = getWeakChapters();
    if(weakChapters.length) pool = pool.filter(q=>weakChapters.includes(q.chapter));
  }
  if(state.mode==='random'||state.mode==='timed'){
    pool = pool.sort(()=>Math.random()-.5);
  }
  currentPool = pool;
}

function getWeakChapters(){
  const scores = {};
  const totals = {};
  QUESTIONS.forEach(q=>{
    if(!totals[q.chapter]) totals[q.chapter]=0;
    totals[q.chapter]++;
    if(state.answered[q.id]){
      if(!scores[q.chapter]) scores[q.chapter]=0;
      if(state.answered[q.id].correct) scores[q.chapter]++;
    }
  });
  return Object.entries(totals).filter(([ch,t])=>{
    const s = scores[ch]||0;
    return s/t < 0.6;
  }).map(([ch])=>ch);
}

function renderQCM(){
  renderDashboard();
  const container = document.getElementById('qcm-inner');
  if(!currentPool.length) buildPool();
  
  let html = '';
  if(state.mode==='timed') html += `<div class="timer-display" id="timer-display">${Math.floor(state.timerSeconds/60)}:${String(state.timerSeconds%60).padStart(2,'0')}</div>`;
  
  // Navigator
  html += `<div class="qnav">`;
  currentPool.forEach((q,i)=>{
    let cls = '';
    if(i===state.currentQ) cls='current';
    else if(state.answered[q.id]) cls=state.answered[q.id].correct?'answered':'wrong-ans';
    if(state.bookmarked[q.id]) cls+=' bookmarked';
    html+=`<button class="qnum ${cls}" onclick="goTo(${i})">${i+1}</button>`;
  });
  html += `</div>`;

  // Single question
  const q = currentPool[state.currentQ];
  if(!q){container.innerHTML=html+'<p style="color:var(--muted);text-align:center;padding:40px">Aucune question disponible.</p>';return;}
  
  const ans = state.answered[q.id];
  const isMulti = Array.isArray(q.ans);
  html += `<div class="qcard">
    <div class="qmeta">
      <span class="tag ch">${CHAPTERS[q.chapter]}</span>
      <span class="tag ${q.diff}">${q.diff}</span>
      ${isMulti?'<span class="tag" style="background:#1a1a2e;color:#818cf8">Choix multiples</span>':''}
      <button class="btn sm outline" onclick="toggleBookmark(${q.id})">${state.bookmarked[q.id]?'★ Marqué':'☆ Marquer'}</button>
    </div>
    <div class="qtxt">${q.q}</div>
    <div class="qoptions">`;
  
  q.opts.forEach((opt,i)=>{
    let cls = '';
    if(ans){
      if(isMulti){
        const isCorrect = q.ans.includes(i);
        const wasSelected = ans.selected.includes(i);
        if(isCorrect) cls='correct';
        else if(wasSelected) cls='wrong';
        cls+=' disabled';
      } else {
        if(i===q.ans) cls='correct';
        else if(i===ans.selected) cls='wrong';
        cls+=' disabled';
      }
    } else {
      if(isMulti && state['pending_'+q.id] && state['pending_'+q.id].includes(i)) cls='selected';
    }
    html+=`<button class="qopt ${cls}" onclick="selectOpt(${q.id},${i},${isMulti})">${String.fromCharCode(65+i)}. ${opt}</button>`;
  });
  
  html+='</div>';
  if(isMulti && !ans){
    html+=`<div style="margin-top:12px"><button class="btn sm" onclick="submitMulti(${q.id})">Valider la sélection</button></div>`;
  }
  
  if(ans){
    html+=`<div class="explanation show"><strong>${ans.correct?'✓ Correct !':'✗ Incorrect.'}</strong> ${q.expl}</div>`;
    if(q.trap) html+=`<div class="trap-note">⚠ Piège : ${q.trap}</div>`;
  }
  
  html+='</div>';
  
  // Navigation
  html+=`<div style="display:flex;gap:10px;flex-wrap:wrap">
    <button class="btn outline" onclick="prevQ()">← Préc</button>
    <button class="btn" onclick="nextQ()">Suiv →</button>
    ${ans?`<button class="btn danger sm" onclick="resetQ(${q.id})">↺ Reset question</button>`:''}
  </div>`;
  
  // Results if all answered
  const answeredCount = currentPool.filter(q=>state.answered[q.id]).length;
  if(answeredCount===currentPool.length && currentPool.length>0){
    html += renderResults();
  }
  
  container.innerHTML = html;
  renderTimer();
}

function selectOpt(qid, idx, isMulti){
  const q = currentPool.find(q=>q.id===qid);
  if(!q || state.answered[qid]) return;
  if(isMulti){
    if(!state['pending_'+qid]) state['pending_'+qid]=[];
    const arr = state['pending_'+qid];
    const i = arr.indexOf(idx);
    if(i>=0) arr.splice(i,1); else arr.push(idx);
    renderQCM();
  } else {
    const correct = idx===q.ans;
    state.answered[qid]={selected:idx,correct};
    saveState();
    renderQCM();
  }
}

function submitMulti(qid){
  const q = QUESTIONS.find(q=>q.id===qid);
  const sel = state['pending_'+qid]||[];
  const correct = JSON.stringify([...q.ans].sort())===JSON.stringify([...sel].sort());
  state.answered[qid]={selected:sel,correct};
  saveState();
  renderQCM();
}

function goTo(i){state.currentQ=i;renderQCM();}
function nextQ(){state.currentQ=Math.min(state.currentQ+1,currentPool.length-1);renderQCM();}
function prevQ(){state.currentQ=Math.max(state.currentQ-1,0);renderQCM();}
function toggleBookmark(id){state.bookmarked[id]=!state.bookmarked[id];saveState();renderQCM();}
function resetQ(id){delete state.answered[id];saveState();renderQCM();}
function resetQuiz(){state.answered={};state.bookmarked={};state.currentQ=0;saveState();buildPool();renderQCM();}
function retryWrong(){
  currentPool=QUESTIONS.filter(q=>state.answered[q.id]&&!state.answered[q.id].correct);
  const ids=currentPool.map(q=>q.id);
  ids.forEach(id=>delete state.answered[id]);
  state.currentQ=0;
  saveState();
  renderQCM();
}

function renderResults(){
  const correct = currentPool.filter(q=>state.answered[q.id]?.correct).length;
  const total = currentPool.length;
  const pct = Math.round(correct/total*100);
  
  const byChapter = {};
  currentPool.forEach(q=>{
    if(!byChapter[q.chapter]) byChapter[q.chapter]={c:0,t:0};
    byChapter[q.chapter].t++;
    if(state.answered[q.id]?.correct) byChapter[q.chapter].c++;
  });
  
  let chHtml = '';
  Object.entries(byChapter).forEach(([ch,{c,t}])=>{
    const p=Math.round(c/t*100);
    chHtml+=`<div class="ch-score"><div class="chn">${CHAPTERS[ch]}</div><div class="chv">${p}%</div><div style="font-size:11px;color:var(--muted)">${c}/${t}</div></div>`;
  });
  
  const wrongList = currentPool.filter(q=>state.answered[q.id]&&!state.answered[q.id].correct);
  let wrongHtml = wrongList.map(q=>`<div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:12px"><strong style="color:var(--danger)">✗</strong> ${q.q}<br><span style="color:var(--muted);font-size:11px">${q.expl}</span></div>`).join('');
  
  return `<div class="results-wrap" style="margin-top:24px">
    <div class="score-big">${pct}%</div>
    <div class="score-label">${correct} / ${total} correctes</div>
    <div class="per-chapter">${chHtml}</div>
    ${wrongList.length?`<div><h3 style="font-size:13px;margin-bottom:12px;color:var(--danger)">Questions incorrectes :</h3>${wrongHtml}</div>`:'<p style="color:var(--success);text-align:center">✓ Toutes les questions correctes !</p>'}
    <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn" onclick="retryWrong()">↺ Réessayer les erreurs</button>
      <button class="btn outline" onclick="resetQuiz()">Tout réinitialiser</button>
    </div>
  </div>`;
}

function exportWrong(){
  const wrong = QUESTIONS.filter(q=>state.answered[q.id]&&!state.answered[q.id].correct);
  const txt = wrong.map(q=>`Q: ${q.q}\nA: ${q.opts[q.ans]}\nExpl: ${q.expl}\n`).join('\n---\n');
  const blob = new Blob([txt],{type:'text/plain'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='erreurs_uiux.txt';a.click();
}
