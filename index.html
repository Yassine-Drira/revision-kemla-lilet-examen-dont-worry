function buildFCPool(){
  let pool = [...FLASHCARDS];
  if(state.fcChapter!=='all') pool=pool.filter(f=>f.chapter===state.fcChapter);
  if(state.fcMode==='review') pool=pool.filter(f=>state.fcStates[f.id]==='review'||!state.fcStates[f.id]);
  if(state.fcMode==='mastered') pool=pool.filter(f=>state.fcStates[f.id]==='mastered');
  fcPool = pool;
  if(fcIdx>=fcPool.length) fcIdx=0;
}

function renderFC(){
  // Populate chapter filter
  const sel = document.getElementById('fc-chapter-filter');
  if(sel.options.length<=1){
    Object.entries(CHAPTERS).forEach(([k,v])=>{
      const o=document.createElement('option');o.value=k;o.textContent=v;sel.appendChild(o);
    });
  }
  buildFCPool();
  updateFCCard();
  updateFCProgress();
}

function updateFCCard(){
  const card = document.getElementById('fc-card');
  const f = fcPool[fcIdx];
  if(!f){
    document.getElementById('fc-front-txt').textContent='Aucune carte dans ce mode.';
    document.getElementById('fc-back-txt').innerHTML='';
    document.getElementById('fc-count').textContent='0/0';
    return;
  }
  card.classList.remove('flipped');
  document.getElementById('fc-front-txt').innerHTML=f.front;
  document.getElementById('fc-back-txt').innerHTML=f.back;
  document.getElementById('fc-count').textContent=`${fcIdx+1}/${fcPool.length}`;
  const st=state.fcStates[f.id];
  const colors={'review':'var(--warning)','medium':'var(--secondary)','mastered':'var(--success)'};
  card.style.borderColor=st?colors[st]:'var(--border)';
}

function updateFCProgress(){
  const review=FLASHCARDS.filter(f=>state.fcStates[f.id]==='review').length;
  const medium=FLASHCARDS.filter(f=>state.fcStates[f.id]==='medium').length;
  const mastered=FLASHCARDS.filter(f=>state.fcStates[f.id]==='mastered').length;
  document.getElementById('fc-progress').innerHTML=`
    <span>🔁 À revoir : <strong style="color:var(--warning)">${review}</strong></span>
    <span>〜 Moyen : <strong style="color:var(--secondary)">${medium}</strong></span>
    <span>✓ Maîtrisé : <strong style="color:var(--success)">${mastered}</strong></span>
  `;
}

function flipCard(){document.getElementById('fc-card').classList.toggle('flipped');}
function nextFC(){fcIdx=(fcIdx+1)%Math.max(fcPool.length,1);updateFCCard();}
function prevFC(){fcIdx=(fcIdx-1+Math.max(fcPool.length,1))%Math.max(fcPool.length,1);updateFCCard();}
function shuffleFC(){fcPool.sort(()=>Math.random()-.5);fcIdx=0;updateFCCard();}
function filterFCChapter(val){state.fcChapter=val;buildFCPool();fcIdx=0;updateFCCard();}
function setFCMode(mode){state.fcMode=mode;buildFCPool();fcIdx=0;updateFCCard();}
function setFCState(st){
  const f=fcPool[fcIdx];
  if(!f) return;
  state.fcStates[f.id]=st;
  saveState();
  updateFCCard();
  updateFCProgress();
}
function exportFC(){
  const review=FLASHCARDS.filter(f=>state.fcStates[f.id]==='review'||!state.fcStates[f.id]);
  const txt=review.map(f=>`Q: ${f.front}\nA: ${f.back.replace(/<[^>]+>/g,' ')}\n`).join('\n---\n');
  const blob=new Blob([txt],{type:'text/plain'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='flashcards_a_revoir.txt';a.click();
}

document.addEventListener('keydown',e=>{
  if(document.getElementById('tab-flashcards').classList.contains('active')){
    if(e.key==='ArrowRight') nextFC();
    if(e.key==='ArrowLeft') prevFC();
    if(e.key===' '){e.preventDefault();flipCard();}
  }
});

function globalSearch(query){
  const box=document.getElementById('search-results');
  if(!query||query.length<2){box.style.display='none';return;}
  const q=query.toLowerCase();
  const results=[];
  
  QUESTIONS.forEach(item=>{
    if(item.q.toLowerCase().includes(q)||item.expl.toLowerCase().includes(q)){
      results.push({type:'QCM',text:item.q,chapter:CHAPTERS[item.chapter]});
    }
  });
  FLASHCARDS.forEach(item=>{
    if(item.front.toLowerCase().includes(q)||item.back.toLowerCase().includes(q)){
      results.push({type:'Flashcard',text:item.front,chapter:CHAPTERS[item.chapter]});
    }
  });
  TRAPS.forEach(item=>{
    if(item.wrong.toLowerCase().includes(q)||item.correct.toLowerCase().includes(q)){
      results.push({type:'Piège',text:item.wrong,chapter:CHAPTERS[item.chapter]});
    }
  });
  
  const top=results.slice(0,12);
  if(!top.length){box.innerHTML='<div class="sr-item"><div class="sr-q" style="color:var(--muted)">Aucun résultat.</div></div>';box.style.display='block';return;}
  
  const hl=t=>t.replace(new RegExp(query,'gi'),m=>`<mark>${m}</mark>`);
  box.innerHTML=top.map(r=>`<div class="sr-item"><div class="sr-tag">${r.type} · ${r.chapter}</div><div class="sr-q">${hl(r.text.substring(0,80))}...</div></div>`).join('');
  box.style.display='block';
}

document.addEventListener('click',e=>{
  if(!e.target.closest('.search-wrap')) document.getElementById('search-results').style.display='none';
});

// ============================================================
// INIT
// ============================================================
buildPool();
renderQCM();
renderDashboard();
renderFC();
renderTraps();
</script>
</body>
